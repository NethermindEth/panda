name: Build Branch Images

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to build from"
        required: true
        type: string
      tag-suffix:
        description: "Optional suffix appended to the immutable tag (defaults to short SHA)"
        required: false
        type: string
        default: ""

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      short-sha: ${{ steps.sha.outputs.short }}
      slug: ${{ steps.slug.outputs.slug }}
      tag-suffix: ${{ steps.suffix.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - id: sha
        run: echo "short=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - id: slug
        env:
          REF: ${{ inputs.ref }}
        run: |
          SLUG=$(printf '%s' "$REF" \
            | sed 's|[^a-zA-Z0-9._-]|-|g' \
            | sed 's/--*/-/g' \
            | sed 's/^[-.]*//;s/[-.]*$//' \
            | tr '[:upper:]' '[:lower:]')
          if [ -z "$SLUG" ]; then
            SLUG="dispatch"
          fi
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - id: suffix
        env:
          USER_SUFFIX: ${{ inputs.tag-suffix }}
          SHORT_SHA: ${{ steps.sha.outputs.short }}
        run: |
          if [ -n "$USER_SUFFIX" ]; then
            echo "value=$USER_SUFFIX" >> "$GITHUB_OUTPUT"
          else
            echo "value=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: meta
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push.yaml
    with:
      ref: ${{ inputs.ref }}
      version: branch-${{ needs.meta.outputs.slug }}-${{ needs.meta.outputs.short-sha }}
      server-tags: server-branch-${{ needs.meta.outputs.slug }}-${{ needs.meta.outputs.tag-suffix }},server-branch-${{ needs.meta.outputs.slug }}
      cli-tags: branch-${{ needs.meta.outputs.slug }}-${{ needs.meta.outputs.tag-suffix }},branch-${{ needs.meta.outputs.slug }}
      proxy-tags: proxy-branch-${{ needs.meta.outputs.slug }}-${{ needs.meta.outputs.tag-suffix }},proxy-branch-${{ needs.meta.outputs.slug }}
      sandbox-tags: sandbox-branch-${{ needs.meta.outputs.slug }}-${{ needs.meta.outputs.tag-suffix }},sandbox-branch-${{ needs.meta.outputs.slug }}

  summary:
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - name: Write job summary
        env:
          REPO: ${{ github.repository }}
          SLUG: ${{ needs.meta.outputs.slug }}
          SUFFIX: ${{ needs.meta.outputs.tag-suffix }}
          SHA: ${{ needs.meta.outputs.short-sha }}
          REF: ${{ inputs.ref }}
        run: |
          IMAGE="ghcr.io/$(echo "$REPO" | tr '[:upper:]' '[:lower:]')"
          {
            echo "### Docker images built"
            echo ""
            echo "Ref: \`$REF\` (commit \`$SHA\`)"
            echo ""
            echo "| Component | Image |"
            echo "|-----------|-------|"
            echo "| Server | \`${IMAGE}:server-branch-${SLUG}-${SUFFIX}\` |"
            echo "| CLI | \`${IMAGE}:branch-${SLUG}-${SUFFIX}\` |"
            echo "| Proxy | \`${IMAGE}:proxy-branch-${SLUG}-${SUFFIX}\` |"
            echo "| Sandbox | \`${IMAGE}:sandbox-branch-${SLUG}-${SUFFIX}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
