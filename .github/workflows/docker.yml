name: Build Check

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.goreleaser.yaml'
      - 'goreleaser.*.Dockerfile'
      - 'sandbox/Dockerfile'
  push:
    branches: [master]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.goreleaser.yaml'
      - 'goreleaser.*.Dockerfile'
      - 'sandbox/Dockerfile'

concurrency:
  group: build-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: GoReleaser dry-run
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: '~> v2'
          # Skip sign/sbom in the dry-run: keyless signing needs OIDC (only on
          # tag releases) and SBOMs need syft, neither of which this check job
          # provides. The release workflow runs both for real.
          args: release --snapshot --skip=publish,sign,sbom --clean
        env:
          LATEST_TAG: latest

      - name: Build server and sandbox images
        run: |
          mkdir -p linux/amd64
          cp dist/panda-server_linux_amd64_v1/panda-server linux/amd64/panda-server
          docker build -f goreleaser.server.Dockerfile -t panda-server-smoke .
          docker build -f sandbox/Dockerfile -t panda-sandbox-smoke .

      - name: Smoke test server sandbox initialization
        run: |
          # Write a minimal config that the server can parse.
          # The server will initialize the sandbox (Docker access, image pull,
          # network creation) before attempting to connect to the proxy.
          cat > /tmp/smoke-config.yaml <<'CONFIG'
          server:
            host: "0.0.0.0"
            port: 2480
          sandbox:
            image: "panda-sandbox-smoke:latest"
            network: "panda-smoke-test"
          proxy:
            url: "http://localhost:19999"
          CONFIG

          # Run the server detached and poll its logs for sandbox initialization.
          # The server keeps running when the proxy is unreachable (initial
          # discovery is non-fatal), so we must not wait for it to exit.
          CID=$(docker run -d \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /tmp/smoke-config.yaml:/app/config.yaml:ro \
            --group-add "$(stat -c '%g' /var/run/docker.sock)" \
            panda-server-smoke \
            panda-server serve --config /app/config.yaml)

          ok=false
          for _ in $(seq 1 30); do
            if docker logs "$CID" 2>&1 | grep -q "Sandbox service started"; then
              ok=true
              break
            fi
            # Stop early if the server exited before initializing the sandbox.
            if [ "$(docker inspect -f '{{.State.Running}}' "$CID" 2>/dev/null)" != "true" ]; then
              break
            fi
            sleep 2
          done

          echo "---- server logs ----"
          docker logs "$CID" 2>&1 || true

          # Clean up the container and the network created by the server.
          docker rm -f "$CID" >/dev/null 2>&1 || true
          docker network rm panda-smoke-test 2>/dev/null || true

          if [ "$ok" = "true" ]; then
            echo "Smoke test passed: sandbox initialized successfully"
          else
            echo "Smoke test failed: sandbox did not initialize"
            exit 1
          fi

  build-sandbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build sandbox image
        run: docker build -f sandbox/Dockerfile .
