name: Benchmarkoor smoke

# End-to-end test of the benchmarkoor integration: CLI -> server -> proxy
# (API-key injection) -> a real benchmarkoor API over fixture results. Also
# asserts the vendored contract-test OpenAPI spec matches the pinned
# benchmarkoor image, covering the routes the offline contract test can't.
#
# Path-filtered (NOT a required status check — required checks must run on
# every PR, see ci.yml): only the surfaces the e2e actually exercises
# trigger it.
on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    paths:
      - "modules/benchmarkoor/**"
      - "pkg/cli/benchmarkoor.go"
      - "pkg/proxy/**"
      - "pkg/server/operations_benchmarkoor*.go"
      - "pkg/server/testdata/benchmarkoor_openapi.yaml"
      - "scripts/e2e-benchmarkoor.sh"
      - ".github/workflows/benchmarkoor-smoke.yaml"
  push:
    branches: [master]
    paths:
      - "modules/benchmarkoor/**"
      - "pkg/cli/benchmarkoor.go"
      - "pkg/proxy/**"
      - "pkg/server/operations_benchmarkoor*.go"
      - "pkg/server/testdata/benchmarkoor_openapi.yaml"
      - "scripts/e2e-benchmarkoor.sh"
      - ".github/workflows/benchmarkoor-smoke.yaml"

concurrency:
  group: benchmarkoor-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  SANDBOX_IMAGE: ${{ vars.SANDBOX_IMAGE || 'ghcr.io/ethpandaops/panda-sandbox' }}

jobs:
  benchmarkoor-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Log in to GHCR (sandbox image cache)
        run: echo "${{ github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Same content-hash cache as the eval workflows: the candidate sandbox
      # image (with this commit's python modules) is pulled when its inputs
      # are unchanged and built+published only when they changed. This keeps
      # the e2e's python-sandbox leg mandatory (E2E_PYTHON=1) instead of
      # skipping on a stale published image.
      - name: Sandbox image (build only if its inputs changed)
        run: |
          set -euo pipefail
          HASH=$(make sandbox-hash)
          IMG="${SANDBOX_IMAGE}:${HASH}"
          echo "Sandbox image: $IMG"
          if docker image inspect "$IMG" >/dev/null 2>&1; then
            echo "Already present on this runner — no build, no pull."
          elif docker manifest inspect "$IMG" >/dev/null 2>&1; then
            echo "In registry — pulling."
            docker pull "$IMG"
          else
            echo "Sandbox inputs changed — building $IMG and publishing it."
            docker build -t "$IMG" -f sandbox/Dockerfile .
            docker push "$IMG" || echo "WARNING: push failed (registry creds?); using local image."
          fi
          echo "E2E_SANDBOX_IMAGE=$IMG" >> "$GITHUB_ENV"

      - name: Run benchmarkoor e2e
        run: E2E_PYTHON=1 SANDBOX_IMAGE="$E2E_SANDBOX_IMAGE" ./scripts/e2e-benchmarkoor.sh
