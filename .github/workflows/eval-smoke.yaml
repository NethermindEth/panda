name: Eval Smoke

# Fast smoke eval: a couple of real questions that verify the whole pipeline end to
# end — the agent drives the panda CLI, reaches the data, queries, and returns a
# plausible answer. Runs as the external-scoped `panda-ci` service account against
# the hosted production proxy.
#
# Every run also builds the interactive eval report (the same page a release
# qualification gets) anchored to this branch's previous runs, the latest master
# run, and the most recent release record. Published runs land under eval/ci/ on
# gh-pages, where a single shared viewer page fetches per-commit payload JSONs —
# walking commits never re-downloads the UI.
#
# Triggers: `pull_request` covers PR branches (checks + the results/Langfuse-trace
# comments); `push` is master-only so we don't double-run every PR commit (a push to
# a PR branch already fires pull_request) — the master run also populates the embedding
# cache that PR runs restore.
on:
  push:
    branches: [master]
  # `labeled` lets a maintainer trigger the gated run on a Dependabot PR (see the
  # smoke job's `if`).
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

concurrency:
  group: eval-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write        # push the smoke report payload to the gh-pages branch
  pages: write           # ...and deploy the site from this run (workflow-driven Pages)
  id-token: write        # deploy-pages authenticates the deployment via OIDC
  packages: write        # push/pull the content-addressed sandbox image to GHCR
  checks: write          # publish-unit-test-result-action creates a check run
  pull-requests: write   # ...and posts the smoke results comment on PRs

env:
  # Hosted production proxy + its Authentik issuer (dual-issuer: Dex humans + Authentik CI).
  PANDA_PROXY_URL: ${{ vars.PANDA_PROXY_URL || 'https://panda-proxy.ethpandaops.io' }}
  PANDA_PROXY_OIDC_ISSUER: ${{ vars.PANDA_PROXY_OIDC_ISSUER || 'https://authentik.analytics.production.platform.ethpandaops.io/application/o/panda-proxy/' }}
  # Sandbox image is content-addressed (tag = hash of its build inputs); only built
  # when those inputs change, and cached in GHCR. See sandbox-image-cleanup.yaml.
  SANDBOX_IMAGE: ${{ vars.SANDBOX_IMAGE || 'ghcr.io/ethpandaops/panda-sandbox' }}
  # Where the gh-pages CI report viewer is served from (eval/ci/ on the gh-pages
  # branch — one shared page that fetches per-commit payload JSONs).
  EVAL_PAGES_URL: ${{ vars.EVAL_PAGES_URL || 'https://ethpandaops.github.io/panda/eval/ci/' }}

jobs:
  smoke:
    # The smoke test needs the proxy + model secrets, but a Dependabot PR runs
    # the freshly-bumped (untrusted) dependency code — and GitHub correctly
    # withholds Actions secrets from Dependabot-triggered runs. So gate it: a
    # Dependabot PR only runs smoke once a maintainer who has eyeballed the bump
    # adds the `run-smoke` label. That `labeled` event runs with the maintainer
    # as actor, so it gets the real secrets. Non-Dependabot PRs, master pushes,
    # and manual dispatches run unconditionally. The actor guard skips the
    # secret-less re-run when Dependabot then force-pushes the labelled branch.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'dependabot[bot]' ||
      (github.actor != 'dependabot[bot]' &&
      contains(github.event.pull_request.labels.*.name, 'run-smoke'))
    runs-on: ubuntu-latest
    # Ceiling must fit the worst case the inner timeouts allow: sandbox image
    # build (~6-8m) + one slow question at --subject-timeout 600s plus its
    # in-worker retry (~21m total). 20m silently cancelled exactly that case.
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve report identity (branch / commit / publish target)
        id: ident
        # Env indirection, not ${{ }} inside run: branch names are attacker-chosen
        # on fork PRs and must not be interpolated into shell source.
        env:
          EVENT: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "pull_request" ]; then
            BRANCH="$HEAD_REF"; SHA="$HEAD_SHA"; PR="$PR_NUMBER"
          else
            BRANCH="$GITHUB_REF_NAME"; SHA="$GITHUB_SHA"; PR=""
          fi
          # Fork PRs run with a read-only token and can't push gh-pages; their
          # report stays in the run artifact only.
          PUBLISH=true
          if [ "$EVENT" = "pull_request" ] && [ "$HEAD_REPO" != "$GITHUB_REPOSITORY" ]; then
            PUBLISH=false
          fi
          # Subject line of the measured commit. The depth-1 PR checkout holds only
          # the merge commit, not the head it points at — fetch the sha itself.
          # Heredoc output: subjects are attacker-chosen text and must not be able
          # to inject further outputs.
          git cat-file -e "$SHA" 2>/dev/null || git fetch --depth 1 origin "$SHA" 2>/dev/null || true
          MSG=$(git log -1 --format=%s "$SHA" 2>/dev/null | head -c 200 || true)
          echo "commit subject: ${MSG:-<unavailable>}"
          {
            echo "branch=$BRANCH"
            echo "sha=$SHA"
            echo "pr=$PR"
            echo "publish=$PUBLISH"
            echo "msg<<PANDA_EOF"
            echo "$MSG"
            echo "PANDA_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "measuring $BRANCH@$SHA (publish=$PUBLISH)"

      - name: Set up Go (module + build cache)
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries (server + panda CLI)
        run: |
          make build
          echo "$GITHUB_WORKSPACE" >> "$GITHUB_PATH"   # put `panda` on PATH for the CLI route

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          # Keep in sync with the uv pinned in sandbox/Dockerfile.
          version: "0.11.17"
          enable-cache: true

      - name: Install eval deps
        working-directory: tests/eval
        run: uv sync

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      # npm ci against the committed lockfile: transitive deps and the platform
      # binary are integrity-hashed, so nothing resolves live from the registry.
      - name: Install opencode (locked)
        working-directory: .github/opencode
        run: |
          npm ci --no-audit --no-fund
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Configure opencode auth (opencode-go)
        env:
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
        run: |
          python3 - <<'PY'
          import json, os, pathlib
          p = pathlib.Path.home() / ".local/share/opencode/auth.json"
          p.parent.mkdir(parents=True, exist_ok=True)
          auth = json.loads(p.read_text()) if p.exists() else {}
          auth["opencode-go"] = {"type": "api", "key": os.environ["OPENCODE_GO_API_KEY"]}
          p.write_text(json.dumps(auth))
          p.chmod(0o600)
          print("configured opencode-go auth")
          PY

      - name: Log in to GHCR (sandbox image cache)
        run: echo "${{ github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Sandbox image (build only if its inputs changed)
        run: |
          set -euo pipefail
          HASH=$(make sandbox-hash)
          IMG="${SANDBOX_IMAGE}:${HASH}"
          echo "Sandbox image: $IMG"
          if docker image inspect "$IMG" >/dev/null 2>&1; then
            echo "Already present on this runner — no build, no pull."
          elif docker manifest inspect "$IMG" >/dev/null 2>&1; then
            echo "In registry — pulling."
            docker pull "$IMG"
          else
            echo "Sandbox inputs changed — building $IMG and publishing it."
            docker build -t "$IMG" -f sandbox/Dockerfile .
            docker push "$IMG" || echo "WARNING: push failed (registry creds?); using local image."
          fi
          # Name the eval config references.
          docker tag "$IMG" ethpandaops-panda-sandbox:latest

      - name: Mint panda-ci service-account credential
        working-directory: tests/eval
        env:
          PANDA_CI_SVC_TOKEN: ${{ secrets.PANDA_CI_SVC_TOKEN }}
        run: uv run python -m scripts.ci_auth

      - name: Write server config (talks to the hosted production proxy as panda-ci)
        run: |
          cat > config.ci.yaml << EOF
          server:
            host: "0.0.0.0"
            port: 2480
            base_url: "http://127.0.0.1:2480"
            sandbox_url: "http://127.0.0.1:2480"

          sandbox:
            backend: docker
            image: "ethpandaops-panda-sandbox:latest"
            network: "host"

          proxy:
            url: "${PANDA_PROXY_URL}"
            auth:
              # oidc mode = externally-minted token (ci_auth), empty resource. Without
              # this the server defaults resource to the proxy URL, changing the
              # credential-store digest so it never finds the token ci_auth wrote.
              mode: "oidc"
              issuer_url: "${PANDA_PROXY_OIDC_ISSUER}"
              client_id: "panda-proxy"
          EOF

      - name: Configure panda CLI (CLI route shells out to `panda` -> local server)
        run: |
          mkdir -p "$HOME/.config/panda"
          cat > "$HOME/.config/panda/config.yaml" << 'EOF'
          server:
            base_url: "http://localhost:2480"
          EOF

      - name: Cache embedding vectors (server's local vector cache)
        # The server pulls ~9k embedding vectors from the proxy at startup to build
        # its search indexes (~140s on a cold runner). The vectors are content-addressed
        # ({model}:{sha256(text)}), so persisting this dir across runs lets the server
        # read them off disk instead — server start drops to seconds. Rolling snapshot:
        # run_id key always saves; restore-keys pulls the latest (incl. master's, which
        # every branch can read), so only genuinely-new chunks re-fetch.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.panda/data/cache
          key: panda-embed-cache-${{ github.run_id }}
          restore-keys: panda-embed-cache-

      - name: Start server
        run: |
          ./panda-server serve --config config.ci.yaml > server.log 2>&1 &
          # Cold runners (no embedding cache) build the semantic-search indexes via
          # the proxy at startup (~2-3 min) before /health is ready, so wait up to 4m
          # and fail fast (don't let the eval run against a not-ready server).
          for i in $(seq 1 120); do
            if curl -sf http://localhost:2480/health >/dev/null 2>&1; then echo "server ready after $((i*2))s"; break; fi
            echo "waiting for server... ($i/120)"; sleep 2
          done
          if ! curl -sf http://localhost:2480/health >/dev/null 2>&1; then
            echo "ERROR: server not ready after 240s; last 60 log lines:"; tail -60 server.log; exit 1
          fi

      - name: Run smoke evals (opencode-go, panda CLI route)
        working-directory: tests/eval
        env:
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
          # promptfoo grades each case's llm-rubric asserts via the judge model, routed
          # through the opencode-go gateway (same key as the subjects).
          MCP_EVAL_REASONING_EFFORT: high
          MCP_EVAL_OPENCODE_TIMEOUT: "120"
          MCP_EVAL_RUN_LABEL: smoke
          # Ship traces to the dedicated prod Langfuse (shitpit-backed). Enables when
          # the LANGFUSE_HOST repo var + keys are set. GitHub auto-sets the GITHUB_*
          # vars the agent turns into the trace's ci_run_url link.
          MCP_EVAL_LANGFUSE_ENABLED: ${{ vars.LANGFUSE_HOST != '' && 'true' || 'false' }}
          MCP_EVAL_LANGFUSE_HOST: ${{ vars.LANGFUSE_HOST }}
          MCP_EVAL_LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          MCP_EVAL_LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
        run: |
          # Minimal smoke: one subject, canonical phrasings, k=1 — 4 runs that prove the
          # pipeline works end to end. The multi-subject / paraphrase / repeat sweeps
          # belong to the harden loop, not per-commit CI. --concurrency 6: the local
          # default (16) starves a 4-vCPU runner. --subject-timeout 600: the 300s
          # default times out healthy-but-slow runs on this runner; slow is measured
          # (and bounded by the job timeout), not crashed. --save-dir reports/run puts
          # the per-run trace files inside the uploaded artifact, so a failing agent's
          # actual commands are diagnosable from CI without Langfuse access.
          uv run python -m scripts.eval \
            --tags smoke --no-variations --concurrency 6 \
            --subject opencode-go/deepseek-v4-flash:cli \
            --subject-timeout 600 \
            --save-dir reports/run \
            --junit reports/junit.xml --json reports/eval.json

      - name: Server log (sandbox / proxy activity)
        if: always()
        run: |
          echo "===== panda-server log (last 150 lines) ====="
          tail -150 server.log 2>/dev/null || echo "(no server.log)"
          # Full log into the uploaded artifact: agents intermittently hit
          # connection-refused against the server mid-eval, and diagnosing that
          # needs the server's own view of the run.
          mkdir -p tests/eval/reports
          if [ -f server.log ]; then cp server.log tests/eval/reports/server.log; fi
          echo "===== docker ps (sandbox containers?) ====="
          docker ps -a --format '{{.Image}} {{.Status}} {{.Names}}' 2>/dev/null | head || true

      # ── interactive report ──────────────────────────────────────────────
      # The same page a release qualification gets, built for this commit and
      # anchored to this branch's previous smoke runs, the latest master run,
      # and the most recent release record. always(): a red smoke run is exactly
      # the one worth inspecting, and eval.json is written before the gate exits.

      - name: Collect report baselines (gh-pages history + latest release record)
        if: always() && hashFiles('tests/eval/reports/eval.json') != ''
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.ident.outputs.branch }}
          SHA: ${{ steps.ident.outputs.sha }}
        run: |
          set -euo pipefail
          mkdir -p report-history report-baselines
          # Most recent release's qualification record. Absent when no release has
          # been qualified yet — the report just loses that reference point.
          gh release download --pattern eval-qualification.json \
              --output report-baselines/release.json 2>/dev/null \
            && echo "fetched latest release qualification record" \
            || echo "no release qualification record available"
          # This branch's previous payloads + the latest master payload, from gh-pages.
          if git fetch --depth 1 origin gh-pages 2>/dev/null; then
            git worktree add --detach /tmp/pages-read FETCH_HEAD
            (cd tests/eval && uv run python -m scripts.ci_pages collect \
              --pages-dir /tmp/pages-read --branch "$BRANCH" --sha "$SHA" \
              --history-out "$GITHUB_WORKSPACE/report-history" \
              --master-baseline-out "$GITHUB_WORKSPACE/report-baselines/master.json")
            git worktree remove --force /tmp/pages-read
          else
            echo "no gh-pages branch yet — first publish creates it"
          fi

      - name: Build smoke report
        if: always() && hashFiles('tests/eval/reports/eval.json') != ''
        working-directory: tests/eval
        env:
          BRANCH: ${{ steps.ident.outputs.branch }}
          SHA: ${{ steps.ident.outputs.sha }}
          PR: ${{ steps.ident.outputs.pr }}
          PUBLISH: ${{ steps.ident.outputs.publish }}
          COMMIT_MSG: ${{ steps.ident.outputs.msg }}
          EVENT: ${{ github.event_name }}
        run: |
          # data.json is what gh-pages serves; eval-report.html is the same payload
          # baked into a self-contained page for the run artifact (fork PRs never
          # publish, so the artifact is their only copy). --pages-url only when this
          # run will publish, so the PR comment never links a page that won't exist.
          ARGS=(--eval-json reports/eval.json
                --branch "$BRANCH" --sha "$SHA" --pr "$PR" --event "$EVENT"
                --commit-message "$COMMIT_MSG"
                --repo "$GITHUB_REPOSITORY"
                --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
                --history-dir "$GITHUB_WORKSPACE/report-history"
                --baseline "$GITHUB_WORKSPACE/report-baselines/master.json"
                --baseline "$GITHUB_WORKSPACE/report-baselines/release.json"
                --langfuse-links reports/langfuse_links.md
                --out-dir reports/ci)
          [ "$PUBLISH" = "true" ] && ARGS+=(--pages-url "$EVAL_PAGES_URL")
          uv run python -m scripts.ci_report "${ARGS[@]}"

      - name: Publish report to GitHub Pages (gh-pages branch)
        id: publish
        if: always() && steps.ident.outputs.publish == 'true' && hashFiles('tests/eval/reports/ci/data.json') != ''
        env:
          BRANCH: ${{ steps.ident.outputs.branch }}
          SHA: ${{ steps.ident.outputs.sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # gh-pages holds generated artifacts only, so each publish pushes a single
          # parentless snapshot commit of the whole tree — the branch never accumulates
          # git history (per-commit payloads would otherwise pile up in pack files
          # forever, long after pruning removed them from the tree). Concurrent
          # publishers race on the push: the lease detects it; rebuild from a fresh
          # fetch and retry instead of failing.
          for attempt in 1 2 3; do
            git worktree remove --force /tmp/pages 2>/dev/null || true
            rm -rf /tmp/pages
            BASE=""
            if git fetch --depth 1 origin gh-pages 2>/dev/null; then
              BASE=$(git rev-parse FETCH_HEAD)
              git worktree add --detach /tmp/pages FETCH_HEAD
            else
              git worktree add --detach /tmp/pages
              git -C /tmp/pages rm -rfq . 2>/dev/null || true
              touch /tmp/pages/.nojekyll
            fi
            (cd tests/eval && uv run python -m scripts.ci_pages publish \
              --pages-dir /tmp/pages --payload reports/ci/data.json)
            git -C /tmp/pages add -A
            SNAP=$(git -C /tmp/pages commit-tree "$(git -C /tmp/pages write-tree)" \
              -m "eval reports: ${BRANCH}@${SHA:0:7}")
            if [ -n "$BASE" ]; then
              LEASE=(--force-with-lease=refs/heads/gh-pages:"$BASE")
            else
              LEASE=()
            fi
            if git -C /tmp/pages push "${LEASE[@]}" origin "${SNAP}:refs/heads/gh-pages"; then
              echo "report published: ${EVAL_PAGES_URL}"
              # Export the exact tree we just made the branch tip; the deploy steps
              # below serve it (Pages is workflow-driven — no legacy branch builder).
              rm -rf /tmp/pages-site
              cp -R /tmp/pages /tmp/pages-site
              rm -f /tmp/pages-site/.git
              break
            fi
            echo "push raced another publisher (attempt $attempt)"
            [ "$attempt" = 3 ] && exit 1
          done
          git worktree remove --force /tmp/pages 2>/dev/null || true

      # Deploys carry only the UI shell: the viewer reads data straight off the
      # gh-pages branch via raw.githubusercontent, so a deploy race can at worst
      # briefly serve an older shell, never stale data. Self-gating: deploys are
      # skipped until the repo's Pages config is build_type=workflow.
      - name: Check Pages deploy mode
        id: pagesmode
        if: always() && steps.publish.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "workflow=$(gh api "repos/$GITHUB_REPOSITORY/pages" --jq '.build_type == "workflow"' 2>/dev/null || echo false)" >> "$GITHUB_OUTPUT"

      - name: Upload site artifact
        if: always() && steps.pagesmode.outputs.workflow == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: /tmp/pages-site

      - name: Deploy to GitHub Pages
        if: always() && steps.pagesmode.outputs.workflow == 'true'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Upload results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: eval-smoke-${{ github.run_id }}
          path: tests/eval/reports/
          retention-days: 14

      - name: Publish smoke results check
        # Check run only — the PR comment below carries the results, the report
        # link, and the trace links in one place.
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        if: always()
        with:
          files: tests/eval/reports/junit.xml
          check_name: "Eval Smoke"
          comment_mode: "off"

      - name: Comment smoke results (report link + per-question results + traces)
        if: ${{ always() && github.event_name == 'pull_request' && hashFiles('tests/eval/reports/ci/pr_comment.md') != '' }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: eval-smoke
          path: tests/eval/reports/ci/pr_comment.md
