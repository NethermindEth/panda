name: Eval Smoke

# Fast smoke eval: a couple of real questions that verify the whole pipeline end to
# end — the agent drives the panda CLI, reaches the data, queries, and returns a
# plausible answer. Runs as the external-scoped `panda-ci` service account against
# the hosted production proxy.
#
# Triggers: `pull_request` covers PR branches (checks + the results/Langfuse-trace
# comments); `push` is master-only so we don't double-run every PR commit (a push to
# a PR branch already fires pull_request) — the master run also populates the embedding
# cache that PR runs restore.
on:
  push:
    branches: [master]
  # `labeled` lets a maintainer trigger the gated run on a Dependabot PR (see the
  # smoke job's `if`).
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

concurrency:
  group: eval-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write        # push/pull the content-addressed sandbox image to GHCR
  checks: write          # publish-unit-test-result-action creates a check run
  pull-requests: write   # ...and posts the smoke results comment on PRs

env:
  # Hosted production proxy + its Authentik issuer (dual-issuer: Dex humans + Authentik CI).
  PANDA_PROXY_URL: ${{ vars.PANDA_PROXY_URL || 'https://panda-proxy.ethpandaops.io' }}
  PANDA_PROXY_OIDC_ISSUER: ${{ vars.PANDA_PROXY_OIDC_ISSUER || 'https://authentik.analytics.production.platform.ethpandaops.io/application/o/panda-proxy/' }}
  # Sandbox image is content-addressed (tag = hash of its build inputs); only built
  # when those inputs change, and cached in GHCR. See sandbox-image-cleanup.yaml.
  SANDBOX_IMAGE: ${{ vars.SANDBOX_IMAGE || 'ghcr.io/ethpandaops/panda-sandbox' }}

jobs:
  smoke:
    # The smoke test needs the proxy + model secrets, but a Dependabot PR runs
    # the freshly-bumped (untrusted) dependency code — and GitHub correctly
    # withholds Actions secrets from Dependabot-triggered runs. So gate it: a
    # Dependabot PR only runs smoke once a maintainer who has eyeballed the bump
    # adds the `run-smoke` label. That `labeled` event runs with the maintainer
    # as actor, so it gets the real secrets. Non-Dependabot PRs, master pushes,
    # and manual dispatches run unconditionally. The actor guard skips the
    # secret-less re-run when Dependabot then force-pushes the labelled branch.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.user.login != 'dependabot[bot]' ||
      (github.actor != 'dependabot[bot]' &&
      contains(github.event.pull_request.labels.*.name, 'run-smoke'))
    runs-on: ubuntu-latest
    # Ceiling must fit the worst case the inner timeouts allow: sandbox image
    # build (~6-8m) + one slow question at --subject-timeout 600s plus its
    # in-worker retry (~21m total). 20m silently cancelled exactly that case.
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go (module + build cache)
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries (server + panda CLI)
        run: |
          make build
          echo "$GITHUB_WORKSPACE" >> "$GITHUB_PATH"   # put `panda` on PATH for the CLI route

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          # Keep in sync with the uv pinned in sandbox/Dockerfile.
          version: "0.11.17"
          enable-cache: true

      - name: Install eval deps
        working-directory: tests/eval
        run: uv sync

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      # npm ci against the committed lockfile: transitive deps and the platform
      # binary are integrity-hashed, so nothing resolves live from the registry.
      - name: Install opencode (locked)
        working-directory: .github/opencode
        run: |
          npm ci --no-audit --no-fund
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Configure opencode auth (opencode-go)
        env:
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
        run: |
          python3 - <<'PY'
          import json, os, pathlib
          p = pathlib.Path.home() / ".local/share/opencode/auth.json"
          p.parent.mkdir(parents=True, exist_ok=True)
          auth = json.loads(p.read_text()) if p.exists() else {}
          auth["opencode-go"] = {"type": "api", "key": os.environ["OPENCODE_GO_API_KEY"]}
          p.write_text(json.dumps(auth))
          p.chmod(0o600)
          print("configured opencode-go auth")
          PY

      - name: Log in to GHCR (sandbox image cache)
        run: echo "${{ github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Sandbox image (build only if its inputs changed)
        run: |
          set -euo pipefail
          HASH=$(make sandbox-hash)
          IMG="${SANDBOX_IMAGE}:${HASH}"
          echo "Sandbox image: $IMG"
          if docker image inspect "$IMG" >/dev/null 2>&1; then
            echo "Already present on this runner — no build, no pull."
          elif docker manifest inspect "$IMG" >/dev/null 2>&1; then
            echo "In registry — pulling."
            docker pull "$IMG"
          else
            echo "Sandbox inputs changed — building $IMG and publishing it."
            docker build -t "$IMG" -f sandbox/Dockerfile .
            docker push "$IMG" || echo "WARNING: push failed (registry creds?); using local image."
          fi
          # Name the eval config references.
          docker tag "$IMG" ethpandaops-panda-sandbox:latest

      - name: Mint panda-ci service-account credential
        working-directory: tests/eval
        env:
          PANDA_CI_SVC_TOKEN: ${{ secrets.PANDA_CI_SVC_TOKEN }}
        run: uv run python -m scripts.ci_auth

      - name: Write server config (talks to the hosted production proxy as panda-ci)
        run: |
          cat > config.ci.yaml << EOF
          server:
            host: "0.0.0.0"
            port: 2480
            base_url: "http://127.0.0.1:2480"
            sandbox_url: "http://127.0.0.1:2480"

          sandbox:
            backend: docker
            image: "ethpandaops-panda-sandbox:latest"
            network: "host"

          proxy:
            url: "${PANDA_PROXY_URL}"
            auth:
              # oidc mode = externally-minted token (ci_auth), empty resource. Without
              # this the server defaults resource to the proxy URL, changing the
              # credential-store digest so it never finds the token ci_auth wrote.
              mode: "oidc"
              issuer_url: "${PANDA_PROXY_OIDC_ISSUER}"
              client_id: "panda-proxy"
          EOF

      - name: Configure panda CLI (CLI route shells out to `panda` -> local server)
        run: |
          mkdir -p "$HOME/.config/panda"
          cat > "$HOME/.config/panda/config.yaml" << 'EOF'
          server:
            base_url: "http://localhost:2480"
          EOF

      - name: Cache embedding vectors (server's local vector cache)
        # The server pulls ~9k embedding vectors from the proxy at startup to build
        # its search indexes (~140s on a cold runner). The vectors are content-addressed
        # ({model}:{sha256(text)}), so persisting this dir across runs lets the server
        # read them off disk instead — server start drops to seconds. Rolling snapshot:
        # run_id key always saves; restore-keys pulls the latest (incl. master's, which
        # every branch can read), so only genuinely-new chunks re-fetch.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.panda/data/cache
          key: panda-embed-cache-${{ github.run_id }}
          restore-keys: panda-embed-cache-

      - name: Start server
        run: |
          ./panda-server serve --config config.ci.yaml > server.log 2>&1 &
          # Cold runners (no embedding cache) build the semantic-search indexes via
          # the proxy at startup (~2-3 min) before /health is ready, so wait up to 4m
          # and fail fast (don't let the eval run against a not-ready server).
          for i in $(seq 1 120); do
            if curl -sf http://localhost:2480/health >/dev/null 2>&1; then echo "server ready after $((i*2))s"; break; fi
            echo "waiting for server... ($i/120)"; sleep 2
          done
          if ! curl -sf http://localhost:2480/health >/dev/null 2>&1; then
            echo "ERROR: server not ready after 240s; last 60 log lines:"; tail -60 server.log; exit 1
          fi

      - name: Run smoke evals (opencode-go, panda CLI route)
        working-directory: tests/eval
        env:
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
          # promptfoo grades each case's llm-rubric asserts via the judge model, routed
          # through OpenRouter (--judge-model below -> openrouter:<model>).
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MCP_EVAL_REASONING_EFFORT: high
          MCP_EVAL_OPENCODE_TIMEOUT: "120"
          MCP_EVAL_RUN_LABEL: smoke
          # Ship traces to the dedicated prod Langfuse (shitpit-backed). Enables when
          # the LANGFUSE_HOST repo var + keys are set. GitHub auto-sets the GITHUB_*
          # vars the agent turns into the trace's ci_run_url link.
          MCP_EVAL_LANGFUSE_ENABLED: ${{ vars.LANGFUSE_HOST != '' && 'true' || 'false' }}
          MCP_EVAL_LANGFUSE_HOST: ${{ vars.LANGFUSE_HOST }}
          MCP_EVAL_LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          MCP_EVAL_LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
        run: |
          # Minimal smoke: one subject, canonical phrasings, k=1 — 4 runs that prove the
          # pipeline works end to end. The multi-subject / paraphrase / repeat sweeps
          # belong to the harden loop, not per-commit CI. --concurrency 6: the local
          # default (16) starves a 4-vCPU runner. --subject-timeout 600: the 300s
          # default times out healthy-but-slow runs on this runner; slow is measured
          # (and bounded by the job timeout), not crashed. --save-dir reports/run puts
          # the per-run trace files inside the uploaded artifact, so a failing agent's
          # actual commands are diagnosable from CI without Langfuse access.
          uv run python -m scripts.eval \
            --tags smoke --no-variations --concurrency 6 \
            --subject opencode-go/deepseek-v4-flash:cli \
            --subject-timeout 600 \
            --save-dir reports/run \
            --junit reports/junit.xml --json reports/eval.json

      - name: Server log (sandbox / proxy activity)
        if: always()
        run: |
          echo "===== panda-server log (last 150 lines) ====="
          tail -150 server.log 2>/dev/null || echo "(no server.log)"
          # Full log into the uploaded artifact: agents intermittently hit
          # connection-refused against the server mid-eval, and diagnosing that
          # needs the server's own view of the run.
          mkdir -p tests/eval/reports
          if [ -f server.log ]; then cp server.log tests/eval/reports/server.log; fi
          echo "===== docker ps (sandbox containers?) ====="
          docker ps -a --format '{{.Image}} {{.Status}} {{.Names}}' 2>/dev/null | head || true

      - name: Upload results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: eval-smoke-${{ github.run_id }}
          path: tests/eval/reports/
          retention-days: 14

      - name: Publish smoke results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        if: always()
        with:
          files: tests/eval/reports/junit.xml
          check_name: "Eval Smoke"
          comment_mode: ${{ github.event_name == 'pull_request' && 'always' || 'off' }}

      - name: Comment Langfuse trace links
        # scripts.eval writes reports/langfuse_links.md (one deep-link per case) when
        # Langfuse is enabled; surface it as a sticky PR comment.
        if: ${{ always() && github.event_name == 'pull_request' && hashFiles('tests/eval/reports/langfuse_links.md') != '' }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: langfuse-traces
          path: tests/eval/reports/langfuse_links.md
