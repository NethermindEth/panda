name: Build PR Images

on:
  pull_request:
    types: [labeled, synchronize]

jobs:
  meta:
    if: contains(github.event.pull_request.labels.*.name, 'build') && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      short-sha: ${{ steps.sha.outputs.short }}
      image-name: ${{ steps.image.outputs.name }}
    steps:
      - id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  build:
    needs: meta
    if: contains(github.event.pull_request.labels.*.name, 'build') && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push.yaml
    with:
      ref: ${{ github.event.pull_request.head.sha }}
      version: pr-${{ github.event.pull_request.number }}-${{ needs.meta.outputs.short-sha }}
      server-tags: server-pr-${{ github.event.pull_request.number }}-${{ needs.meta.outputs.short-sha }},server-pr-${{ github.event.pull_request.number }}
      cli-tags: pr-${{ github.event.pull_request.number }}-${{ needs.meta.outputs.short-sha }},pr-${{ github.event.pull_request.number }}
      proxy-tags: proxy-pr-${{ github.event.pull_request.number }}-${{ needs.meta.outputs.short-sha }},proxy-pr-${{ github.event.pull_request.number }}
      sandbox-tags: sandbox-pr-${{ github.event.pull_request.number }}-${{ needs.meta.outputs.short-sha }},sandbox-pr-${{ github.event.pull_request.number }}

  comment:
    needs: [meta, build]
    if: contains(github.event.pull_request.labels.*.name, 'build') && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Comment PR with image tags
        uses: actions/github-script@v7
        with:
          script: |
            const pr = ${{ github.event.pull_request.number }};
            const sha = '${{ needs.meta.outputs.short-sha }}';
            const image = 'ghcr.io/${{ needs.meta.outputs.image-name }}';
            const body = [
              '### Docker images built',
              '',
              `Commit: \`${sha}\``,
              '',
              '| Component | Image |',
              '|-----------|-------|',
              `| Server | \`${image}:server-pr-${pr}-${sha}\` |`,
              `| CLI | \`${image}:pr-${pr}-${sha}\` |`,
              `| Proxy | \`${image}:proxy-pr-${pr}-${sha}\` |`,
              `| Sandbox | \`${image}:sandbox-pr-${pr}-${sha}\` |`,
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });
            const existing = comments.data.find(c =>
              c.body.includes('Docker images built')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }
