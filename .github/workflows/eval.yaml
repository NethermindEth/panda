name: LLM Evaluation

# Full eval: run a whole cases/*.yaml through the unified harness (scripts.eval) against
# the opencode-go agent over the panda CLI route, graded by promptfoo llm-rubric asserts.
# Builds server + proxy locally (proxy fronts the raw/refined ClickHouse clusters). Opt-in
# per PR via the `run-evals` label; also runs on manual dispatch. Release tags run the
# full-suite scorecard in release-eval.yaml instead.

on:
  pull_request:
    types: [labeled, synchronize]

  workflow_dispatch:
    inputs:
      cases:
        description: 'cases/*.yaml file to run'
        required: false
        default: 'coverage.yaml'
        type: string
      subject:
        description: 'agent subject provider/model:route (blank = harness default)'
        required: false
        default: ''
        type: string
      repeat:
        description: 'runs per (case, subject)'
        required: false
        default: '1'
        type: string

  workflow_call:
    inputs:
      cases:
        required: false
        default: 'coverage.yaml'
        type: string
      subject:
        required: false
        default: ''
        type: string

permissions:
  contents: read
  checks: write          # publish-unit-test-result-action creates a check run
  pull-requests: write   # ...and posts results on PRs

jobs:
  evaluate:
    # On a PR, only run when the `run-evals` label is present. Manual dispatch and
    # workflow_call always run.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'run-evals')
    runs-on:
      - self-hosted-ghr
      - size-m-x64
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build binaries (server + panda CLI)
        run: |
          make build
          echo "$GITHUB_WORKSPACE" >> "$GITHUB_PATH"   # put `panda` on PATH for the CLI route

      - name: Build proxy
        run: make build-proxy

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Install Python dependencies
        working-directory: tests/eval
        run: uv sync

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Install opencode
        run: npm install -g opencode-ai@1.15.0

      - name: Configure opencode auth (opencode-go)
        env:
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
        run: |
          python3 - <<'PY'
          import json, os, pathlib
          p = pathlib.Path.home() / ".local/share/opencode/auth.json"
          p.parent.mkdir(parents=True, exist_ok=True)
          auth = json.loads(p.read_text()) if p.exists() else {}
          auth["opencode-go"] = {"type": "api", "key": os.environ["OPENCODE_GO_API_KEY"]}
          p.write_text(json.dumps(auth))
          p.chmod(0o600)
          print("configured opencode-go auth")
          PY

      - name: Create CI configs
        run: |
          cat > proxy-config.ci.yaml << 'EOF'
          server:
            listen_addr: ":18081"

          auth:
            mode: none

          clickhouse:
            - name: clickhouse-raw
              description: "Raw ClickHouse cluster with raw Ethereum event data"
              host: "${{ secrets.CLICKHOUSE_XATU_HOST }}"
              port: 8443
              database: default
              username: "${{ secrets.CLICKHOUSE_XATU_USERNAME }}"
              password: "${{ secrets.CLICKHOUSE_XATU_PASSWORD }}"
              secure: true
            - name: clickhouse-refined
              description: "Refined ClickHouse cluster with pre-aggregated datasets"
              host: "${{ secrets.CLICKHOUSE_CBT_HOST }}"
              port: 8443
              database: default
              username: "${{ secrets.CLICKHOUSE_CBT_USERNAME }}"
              password: "${{ secrets.CLICKHOUSE_CBT_PASSWORD }}"
              secure: true

          s3:
            endpoint: "${{ secrets.S3_ENDPOINT }}"
            access_key: "${{ secrets.S3_ACCESS_KEY_ID }}"
            secret_key: "${{ secrets.S3_SECRET_ACCESS_KEY }}"
            bucket: "${{ secrets.S3_BUCKET }}"
            region: "${{ secrets.S3_REGION }}"
          EOF

          cat > config.ci.yaml << 'EOF'
          server:
            host: "0.0.0.0"
            port: 2480
            base_url: "http://127.0.0.1:2480"
            sandbox_url: "http://127.0.0.1:2480"

          sandbox:
            backend: docker
            image: "ethpandaops/panda:sandbox-latest"
            network: "host"

          proxy:
            url: "http://127.0.0.1:18081"
          EOF

      - name: Configure panda CLI (CLI route shells out to `panda` -> local server)
        run: |
          mkdir -p "$HOME/.config/panda"
          cat > "$HOME/.config/panda/config.yaml" << 'EOF'
          server:
            base_url: "http://localhost:2480"
          EOF

      - name: Start proxy
        run: |
          ./panda-proxy --config proxy-config.ci.yaml &
          for i in {1..30}; do
            if curl -s http://localhost:18081/health > /dev/null 2>&1; then
              echo "Proxy is ready"
              break
            fi
            echo "Waiting for proxy... ($i/30)"
            sleep 2
          done

      - name: Start server
        run: |
          ./panda-server serve --config config.ci.yaml > server.log 2>&1 &
          # Cold start builds the semantic-search indexes before /health is ready; wait
          # up to 4m and fail fast (don't run the eval against a not-ready server).
          for i in $(seq 1 120); do
            if curl -sf http://localhost:2480/health >/dev/null 2>&1; then echo "server ready after $((i*2))s"; break; fi
            echo "waiting for server... ($i/120)"; sleep 2
          done
          if ! curl -sf http://localhost:2480/health >/dev/null 2>&1; then
            echo "ERROR: server not ready after 240s; last 60 log lines:"; tail -60 server.log; exit 1
          fi

      - name: Run evaluation
        working-directory: tests/eval
        env:
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
          # promptfoo grades each case's llm-rubric asserts via the judge model (OpenRouter).
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MCP_EVAL_REASONING_EFFORT: high
          MCP_EVAL_OPENCODE_TIMEOUT: "180"
          MCP_EVAL_LANGFUSE_ENABLED: ${{ vars.LANGFUSE_HOST != '' && 'true' || 'false' }}
          MCP_EVAL_LANGFUSE_HOST: ${{ vars.LANGFUSE_HOST }}
          MCP_EVAL_LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          MCP_EVAL_LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
        run: |
          # --subject + --judge-model default to the harness defaults (config/settings.py);
          # only override --subject when the dispatch input is set.
          ARGS=(--cases "${{ inputs.cases || 'coverage.yaml' }}" --repeat "${{ inputs.repeat || '1' }}")
          [ -n "${{ inputs.subject }}" ] && ARGS+=(--subject "${{ inputs.subject }}")
          uv run python -m scripts.eval "${ARGS[@]}" \
            --junit reports/junit.xml --json reports/eval.json \
            || true   # don't fail the job before uploading results

      - name: Server log
        if: always()
        run: |
          echo "===== panda-server log (last 150 lines) ====="
          tail -150 server.log 2>/dev/null || echo "(no server.log)"

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: eval-results-${{ github.run_id }}
          path: tests/eval/reports/
          retention-days: 30

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        if: always()
        with:
          files: tests/eval/reports/junit.xml
          check_name: "LLM Evaluation"
          comment_mode: always

      - name: Comment Langfuse trace links
        if: ${{ always() && github.event_name == 'pull_request' && hashFiles('tests/eval/reports/langfuse_links.md') != '' }}
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: langfuse-traces
          path: tests/eval/reports/langfuse_links.md
