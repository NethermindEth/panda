name: LLM Evaluation

on:
  # Run on every release (tag push, matching goreleaser).
  push:
    tags:
      - '*'

  # Opt-in per PR: add the `run-evals` label. The job-level `if` below ensures
  # labeled/synchronize events only proceed while that label is present.
  pull_request:
    types: [labeled, synchronize]

  workflow_dispatch:
    inputs:
      model:
        description: 'Model under test (e.g. deepseek/deepseek-v4-flash, anthropic/claude-sonnet-4-5)'
        required: false
        default: 'deepseek/deepseek-v4-flash'
        type: string
      agent_api:
        description: 'Agent backend: openai | anthropic'
        required: false
        default: 'openai'
        type: string
      reasoning:
        description: 'Reasoning effort: none | low | medium | high'
        required: false
        default: 'high'
        type: string
      category:
        description: 'Test category (empty for all)'
        required: false
        type: string
      markers:
        description: 'pytest markers (e.g., "visualization" or "not slow")'
        required: false
        type: string
      verbose:
        description: 'Enable verbose output'
        required: false
        default: false
        type: boolean

  # Allow triggering from other workflows
  workflow_call:
    inputs:
      model:
        required: false
        default: 'deepseek/deepseek-v4-flash'
        type: string

permissions:
  contents: read
  checks: write          # publish-unit-test-result-action creates a check run
  pull-requests: write   # ...and posts results on PRs

jobs:
  evaluate:
    # On a PR, only run when the `run-evals` label is present. Releases
    # (tag push), manual dispatch, and workflow_call always run.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'run-evals')
    runs-on:
      - self-hosted-ghr
      - size-m-x64
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          version: "latest"

      - name: Install Python dependencies
        working-directory: tests/eval
        run: uv sync

      - name: Build server
        run: make build-server

      - name: Build proxy
        run: make build-proxy

      - name: Create CI configs
        run: |
          cat > proxy-config.ci.yaml << 'EOF'
          server:
            listen_addr: ":18081"

          auth:
            mode: none

          clickhouse:
            - name: clickhouse-raw
              description: "Raw ClickHouse cluster with raw Ethereum event data"
              host: "${{ secrets.CLICKHOUSE_XATU_HOST }}"
              port: 8443
              database: default
              username: "${{ secrets.CLICKHOUSE_XATU_USERNAME }}"
              password: "${{ secrets.CLICKHOUSE_XATU_PASSWORD }}"
              secure: true
            - name: clickhouse-refined
              description: "Refined ClickHouse cluster with pre-aggregated datasets"
              host: "${{ secrets.CLICKHOUSE_CBT_HOST }}"
              port: 8443
              database: default
              username: "${{ secrets.CLICKHOUSE_CBT_USERNAME }}"
              password: "${{ secrets.CLICKHOUSE_CBT_PASSWORD }}"
              secure: true

          s3:
            endpoint: "${{ secrets.S3_ENDPOINT }}"
            access_key: "${{ secrets.S3_ACCESS_KEY_ID }}"
            secret_key: "${{ secrets.S3_SECRET_ACCESS_KEY }}"
            bucket: "${{ secrets.S3_BUCKET }}"
            region: "${{ secrets.S3_REGION }}"
          EOF

          cat > config.ci.yaml << 'EOF'
          server:
            host: "0.0.0.0"
            port: 2480
            base_url: "http://127.0.0.1:2480"
            sandbox_url: "http://127.0.0.1:2480"

          sandbox:
            backend: docker
            image: "ethpandaops/panda:sandbox-latest"
            network: "host"

          proxy:
            url: "http://127.0.0.1:18081"
          EOF

      - name: Start proxy
        run: |
          ./panda-proxy --config proxy-config.ci.yaml &
          for i in {1..30}; do
            if curl -s http://localhost:18081/health > /dev/null 2>&1; then
              echo "Proxy is ready"
              break
            fi
            echo "Waiting for proxy... ($i/30)"
            sleep 2
          done

      - name: Start server
        run: |
          ./panda-server serve --config config.ci.yaml &
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://localhost:2480/health > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done

      - name: Run evaluation
        working-directory: tests/eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MCP_EVAL_MCP_URL: http://localhost:2480
          MCP_EVAL_MODEL: ${{ inputs.model || 'deepseek/deepseek-v4-flash' }}
          MCP_EVAL_AGENT_API: ${{ inputs.agent_api || 'openai' }}
          MCP_EVAL_REASONING_EFFORT: ${{ inputs.reasoning || 'high' }}
          MCP_EVAL_VERBOSE: ${{ inputs.verbose || 'false' }}
          # Agent (default deepseek via OpenRouter) and judge (gemini via OpenRouter)
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          PYTEST_ARGS="tests/"

          if [ -n "${{ inputs.category }}" ]; then
            PYTEST_ARGS="$PYTEST_ARGS -k '${{ inputs.category }}'"
          fi

          if [ -n "${{ inputs.markers }}" ]; then
            PYTEST_ARGS="$PYTEST_ARGS -m '${{ inputs.markers }}'"
          fi

          if [ "${{ inputs.verbose }}" = "true" ]; then
            PYTEST_ARGS="$PYTEST_ARGS -v -s"
          fi

          # Run pytest with JUnit XML output for GitHub Actions
          uv run python -m pytest $PYTEST_ARGS \
            --junitxml=reports/junit.xml \
            --tb=short \
            || true  # Don't fail immediately, we want to upload results

      - name: Generate report
        if: always()
        working-directory: tests/eval
        run: |
          mkdir -p reports
          # Generate summary if we have results
          if [ -f reports/junit.xml ]; then
            echo "# Evaluation Results" > reports/summary.md
            echo "" >> reports/summary.md
            echo "**Model:** ${{ inputs.model || 'deepseek/deepseek-v4-flash' }}" >> reports/summary.md
            echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> reports/summary.md
            echo "" >> reports/summary.md
          fi

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: eval-results-${{ github.run_id }}
          path: |
            tests/eval/reports/
            tests/eval/snapshots/
          retention-days: 30

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        if: always()
        with:
          files: tests/eval/reports/junit.xml
          check_name: "LLM Evaluation Results (${{ inputs.model || 'deepseek/deepseek-v4-flash' }})"
          comment_mode: always
