name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  release:
    runs-on:
      - self-hosted-ghr
      - size-l-x64
    permissions:
      contents: write       # create the GitHub release
      packages: write        # push images
      id-token: write        # keyless cosign signing + provenance via OIDC
      attestations: write    # actions/attest-build-provenance
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Derive latest tag
        id: meta
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [[ "$TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-(.+))$ ]]; then
            SUFFIX="${BASH_REMATCH[2]}"
            echo "latest_tag=${SUFFIX}-latest" >> "$GITHUB_OUTPUT"
          else
            echo "latest_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Verify module checksums
        run: go mod verify

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Sigstore cosign for keyless artifact + image signing.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Syft for SBOM generation (GoReleaser shells out to it).
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Login to DockerHub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: '~> v2'
          args: release --clean --parallelism 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST_TAG: ${{ steps.meta.outputs.latest_tag }}

      # SLSA build provenance linking the release artifacts back to this
      # workflow run and source commit. Verify with `gh attestation verify`.
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/checksums.txt
            dist/*.tar.gz

      - name: Build and push sandbox image
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # Strip the leading "v" so sandbox tags match goreleaser's
          # {{ .Version }} convention used for the server and proxy images
          # (e.g. sandbox-0.31.0, not sandbox-v0.31.0).
          VERSION=${TAG#v}
          SHORT_SHA=${GITHUB_SHA::7}
          LATEST_TAG=${{ steps.meta.outputs.latest_tag }}

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file sandbox/Dockerfile \
            --tag "ethpandaops/panda:sandbox-${VERSION}" \
            --tag "ethpandaops/panda:sandbox-${VERSION}-${SHORT_SHA}" \
            --tag "ethpandaops/panda:sandbox-${LATEST_TAG}" \
            --push .

      # Keyless-sign the immutable version-pinned image tags. cosign resolves
      # each tag to its digest and signs by digest; floating tags (e.g.
      # *-latest) share that digest, so a digest-based verify still holds.
      - name: Sign images
        env:
          COSIGN_YES: "true"
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          for ref in \
            "ethpandaops/panda:${VERSION}" \
            "ethpandaops/panda:server-${VERSION}" \
            "ethpandaops/panda:proxy-${VERSION}" \
            "ethpandaops/panda:sandbox-${VERSION}"; do
            echo "Signing ${ref}"
            cosign sign --recursive "${ref}"
          done
