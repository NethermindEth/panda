name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  release:
    runs-on:
      - self-hosted-ghr
      - size-l-x64
    permissions:
      contents: write       # create the GitHub release
      packages: write        # push images
      id-token: write        # keyless cosign signing + provenance via OIDC
      attestations: write    # actions/attest-build-provenance
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Derive latest tag
        id: meta
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [[ "$TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-(.+))$ ]]; then
            SUFFIX="${BASH_REMATCH[2]}"
            echo "latest_tag=${SUFFIX}-latest" >> "$GITHUB_OUTPUT"
          else
            echo "latest_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Verify module checksums
        run: go mod verify

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      # Sigstore cosign for keyless artifact + image signing.
      - uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      # Syft for SBOM generation (GoReleaser shells out to it).
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Login to DockerHub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: '~> v2'
          args: release --clean --parallelism 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST_TAG: ${{ steps.meta.outputs.latest_tag }}

      # SLSA build provenance linking the release artifacts back to this
      # workflow run and source commit. Verify with `gh attestation verify`.
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            dist/checksums.txt
            dist/*.tar.gz

      - name: Build and push sandbox image
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # Strip the leading "v" so sandbox tags match goreleaser's
          # {{ .Version }} convention used for the server and proxy images
          # (e.g. sandbox-0.31.0, not sandbox-v0.31.0).
          VERSION=${TAG#v}
          SHORT_SHA=${GITHUB_SHA::7}
          LATEST_TAG=${{ steps.meta.outputs.latest_tag }}

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file sandbox/Dockerfile \
            --tag "ethpandaops/panda:sandbox-${VERSION}" \
            --tag "ethpandaops/panda:sandbox-${VERSION}-${SHORT_SHA}" \
            --tag "ethpandaops/panda:sandbox-${LATEST_TAG}" \
            --push .

      # Keyless-sign the immutable version-pinned image tags. cosign resolves
      # each tag to its digest and signs by digest; floating tags (e.g.
      # *-latest) share that digest, so a digest-based verify still holds.
      - name: Sign images
        env:
          COSIGN_YES: "true"
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          for ref in \
            "ethpandaops/panda:${VERSION}" \
            "ethpandaops/panda:server-${VERSION}" \
            "ethpandaops/panda:proxy-${VERSION}" \
            "ethpandaops/panda:sandbox-${VERSION}"; do
            echo "Signing ${ref}"
            cosign sign --recursive "${ref}"
          done
