name: Build and Push Images

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref (branch, tag, or SHA) to check out and build from. Defaults to the workflow ref."
        required: false
        type: string
        default: ""
      version:
        description: "Version string for ldflags (e.g., pr-42, master-abc1234). Auto-derived if empty."
        required: false
        type: string
        default: ""
      server-tags:
        description: "Comma-separated Docker tags for server image. Auto-derived if empty."
        required: false
        type: string
        default: ""
      cli-tags:
        description: "Comma-separated Docker tags for CLI image. Auto-derived if empty."
        required: false
        type: string
        default: ""
      proxy-tags:
        description: "Comma-separated Docker tags for proxy image. Auto-derived if empty."
        required: false
        type: string
        default: ""
      sandbox-tags:
        description: "Comma-separated Docker tags for sandbox image. Auto-derived if empty."
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to build from"
        required: true
        type: string
      tag-suffix:
        description: "Optional suffix appended to the immutable tags (defaults to short SHA)"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Resolve build metadata
        id: meta
        env:
          REF_INPUT: ${{ inputs.ref }}
          VERSION_INPUT: ${{ inputs.version }}
          SERVER_TAGS_INPUT: ${{ inputs.server-tags }}
          CLI_TAGS_INPUT: ${{ inputs.cli-tags }}
          PROXY_TAGS_INPUT: ${{ inputs.proxy-tags }}
          SANDBOX_TAGS_INPUT: ${{ inputs.sandbox-tags }}
          TAG_SUFFIX_INPUT: ${{ inputs.tag-suffix }}
        run: |
          SHA=$(git rev-parse HEAD)
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          IMAGE_LOWER=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')

          SLUG=$(printf '%s' "$REF_INPUT" \
            | sed 's|[^a-zA-Z0-9._-]|-|g' \
            | sed 's/--*/-/g' \
            | sed 's/^[-.]*//;s/[-.]*$//' \
            | tr '[:upper:]' '[:lower:]')
          if [ -z "$SLUG" ]; then
            SLUG="dispatch"
          fi
          SUFFIX="${TAG_SUFFIX_INPUT:-$SHORT_SHA}"

          VERSION="${VERSION_INPUT:-branch-${SLUG}-${SHORT_SHA}}"
          SERVER_TAGS="${SERVER_TAGS_INPUT:-server-branch-${SLUG}-${SUFFIX},server-branch-${SLUG}}"
          CLI_TAGS="${CLI_TAGS_INPUT:-branch-${SLUG}-${SUFFIX},branch-${SLUG}}"
          PROXY_TAGS="${PROXY_TAGS_INPUT:-proxy-branch-${SLUG}-${SUFFIX},proxy-branch-${SLUG}}"
          SANDBOX_TAGS="${SANDBOX_TAGS_INPUT:-sandbox-branch-${SLUG}-${SUFFIX},sandbox-branch-${SLUG}}"

          {
            echo "sha=$SHA"
            echo "short-sha=$SHORT_SHA"
            echo "image=$IMAGE_LOWER"
            echo "slug=$SLUG"
            echo "version=$VERSION"
            echo "server-tags=$SERVER_TAGS"
            echo "cli-tags=$CLI_TAGS"
            echo "proxy-tags=$PROXY_TAGS"
            echo "sandbox-tags=$SANDBOX_TAGS"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binaries
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SHA: ${{ steps.meta.outputs.sha }}
        run: |
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          LDFLAGS="-s -w \
            -X github.com/ethpandaops/panda/internal/version.Version=${VERSION} \
            -X github.com/ethpandaops/panda/internal/version.GitCommit=${SHA} \
            -X github.com/ethpandaops/panda/internal/version.BuildTime=${BUILD_TIME}"

          for GOARCH in amd64 arm64; do
            PLATFORM="linux/${GOARCH}"
            mkdir -p "${PLATFORM}"
            echo "Building for ${PLATFORM}..."
            CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} go build -ldflags "${LDFLAGS}" -o "${PLATFORM}/panda-server" ./cmd/server
            CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} go build -ldflags "${LDFLAGS}" -o "${PLATFORM}/panda" ./cmd/panda
            CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} go build -ldflags "${LDFLAGS}" -o "${PLATFORM}/panda-proxy" ./cmd/proxy
          done

      - name: Build and push server image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ steps.meta.outputs.image }}
          TAGS_INPUT: ${{ steps.meta.outputs.server-tags }}
        run: |
          TAGS=""
          IFS=',' read -ra TAG_ARRAY <<< "${TAGS_INPUT}"
          for TAG in "${TAG_ARRAY[@]}"; do
            TAGS="${TAGS} --tag ${IMAGE}:${TAG}"
          done

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file goreleaser.server.Dockerfile \
            ${TAGS} \
            --push .

      - name: Build and push CLI image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ steps.meta.outputs.image }}
          TAGS_INPUT: ${{ steps.meta.outputs.cli-tags }}
        run: |
          TAGS=""
          IFS=',' read -ra TAG_ARRAY <<< "${TAGS_INPUT}"
          for TAG in "${TAG_ARRAY[@]}"; do
            TAGS="${TAGS} --tag ${IMAGE}:${TAG}"
          done

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file goreleaser.panda.Dockerfile \
            ${TAGS} \
            --push .

      - name: Build and push proxy image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ steps.meta.outputs.image }}
          TAGS_INPUT: ${{ steps.meta.outputs.proxy-tags }}
        run: |
          TAGS=""
          IFS=',' read -ra TAG_ARRAY <<< "${TAGS_INPUT}"
          for TAG in "${TAG_ARRAY[@]}"; do
            TAGS="${TAGS} --tag ${IMAGE}:${TAG}"
          done

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file goreleaser.proxy.Dockerfile \
            ${TAGS} \
            --push .

      - name: Build and push sandbox image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ steps.meta.outputs.image }}
          TAGS_INPUT: ${{ steps.meta.outputs.sandbox-tags }}
        run: |
          TAGS=""
          IFS=',' read -ra TAG_ARRAY <<< "${TAGS_INPUT}"
          for TAG in "${TAG_ARRAY[@]}"; do
            TAGS="${TAGS} --tag ${IMAGE}:${TAG}"
          done

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file sandbox/Dockerfile \
            ${TAGS} \
            --push .

      - name: Job summary
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ steps.meta.outputs.image }}
          REF: ${{ inputs.ref }}
          SHA: ${{ steps.meta.outputs.short-sha }}
          SERVER_TAGS: ${{ steps.meta.outputs.server-tags }}
          CLI_TAGS: ${{ steps.meta.outputs.cli-tags }}
          PROXY_TAGS: ${{ steps.meta.outputs.proxy-tags }}
          SANDBOX_TAGS: ${{ steps.meta.outputs.sandbox-tags }}
        run: |
          first_tag() { echo "$1" | cut -d',' -f1; }
          {
            echo "### Docker images pushed"
            echo ""
            echo "Ref: \`${REF:-${GITHUB_REF}}\` (commit \`${SHA}\`)"
            echo ""
            echo "| Component | Image |"
            echo "|-----------|-------|"
            echo "| Server | \`${IMAGE}:$(first_tag "$SERVER_TAGS")\` |"
            echo "| CLI | \`${IMAGE}:$(first_tag "$CLI_TAGS")\` |"
            echo "| Proxy | \`${IMAGE}:$(first_tag "$PROXY_TAGS")\` |"
            echo "| Sandbox | \`${IMAGE}:$(first_tag "$SANDBOX_TAGS")\` |"
          } >> "$GITHUB_STEP_SUMMARY"
