name: Build and Push Images

on:
  workflow_call:
    inputs:
      version:
        description: "Version string for ldflags (e.g., pr-42, master-abc1234)"
        required: true
        type: string
      server-tags:
        description: "Comma-separated Docker tags for server image"
        required: true
        type: string
      cli-tags:
        description: "Comma-separated Docker tags for CLI image"
        required: true
        type: string
      proxy-tags:
        description: "Comma-separated Docker tags for proxy image"
        required: true
        type: string
      sandbox-tags:
        description: "Comma-separated Docker tags for sandbox image"
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  build:
    runs-on:
      - self-hosted-ghr
      - size-l-x64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to DockerHub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build binaries
        env:
          VERSION: ${{ inputs.version }}
          SHA: ${{ github.sha }}
        run: |
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          LDFLAGS="-s -w \
            -X github.com/ethpandaops/panda/internal/version.Version=${VERSION} \
            -X github.com/ethpandaops/panda/internal/version.GitCommit=${SHA} \
            -X github.com/ethpandaops/panda/internal/version.BuildTime=${BUILD_TIME}"

          for GOARCH in amd64 arm64; do
            PLATFORM="linux/${GOARCH}"
            mkdir -p "${PLATFORM}"
            echo "Building for ${PLATFORM}..."
            CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} go build -ldflags "${LDFLAGS}" -o "${PLATFORM}/panda-server" ./cmd/server
            CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} go build -ldflags "${LDFLAGS}" -o "${PLATFORM}/panda" ./cmd/panda
            CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} go build -ldflags "${LDFLAGS}" -o "${PLATFORM}/panda-proxy" ./cmd/proxy
          done

      - name: Build and push server image
        run: |
          TAGS=""
          IFS=',' read -ra TAG_ARRAY <<< "${{ inputs.server-tags }}"
          for TAG in "${TAG_ARRAY[@]}"; do
            TAGS="${TAGS} --tag ethpandaops/panda:${TAG}"
          done

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file goreleaser.server.Dockerfile \
            ${TAGS} \
            --push .

      - name: Build and push CLI image
        run: |
          TAGS=""
          IFS=',' read -ra TAG_ARRAY <<< "${{ inputs.cli-tags }}"
          for TAG in "${TAG_ARRAY[@]}"; do
            TAGS="${TAGS} --tag ethpandaops/panda:${TAG}"
          done

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file goreleaser.panda.Dockerfile \
            ${TAGS} \
            --push .

      - name: Build and push proxy image
        run: |
          TAGS=""
          IFS=',' read -ra TAG_ARRAY <<< "${{ inputs.proxy-tags }}"
          for TAG in "${TAG_ARRAY[@]}"; do
            TAGS="${TAGS} --tag ethpandaops/panda:${TAG}"
          done

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file goreleaser.proxy.Dockerfile \
            ${TAGS} \
            --push .

      - name: Build and push sandbox image
        run: |
          TAGS=""
          IFS=',' read -ra TAG_ARRAY <<< "${{ inputs.sandbox-tags }}"
          for TAG in "${TAG_ARRAY[@]}"; do
            TAGS="${TAGS} --tag ethpandaops/panda:${TAG}"
          done

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file sandbox/Dockerfile \
            ${TAGS} \
            --push .
