name: Build and Push Images

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref (branch, tag, or SHA) to check out and build from. Defaults to the workflow ref."
        required: false
        type: string
        default: ""
      version:
        description: "Version string for ldflags (e.g., pr-42, master-abc1234)"
        required: true
        type: string
      server-tags:
        description: "Comma-separated Docker tags for server image"
        required: true
        type: string
      cli-tags:
        description: "Comma-separated Docker tags for CLI image"
        required: true
        type: string
      proxy-tags:
        description: "Comma-separated Docker tags for proxy image"
        required: true
        type: string
      sandbox-tags:
        description: "Comma-separated Docker tags for sandbox image"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Resolve build SHA
        id: build-sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Normalize image name
        id: image
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binaries
        env:
          VERSION: ${{ inputs.version }}
          SHA: ${{ steps.build-sha.outputs.sha }}
        run: |
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          LDFLAGS="-s -w \
            -X github.com/ethpandaops/panda/internal/version.Version=${VERSION} \
            -X github.com/ethpandaops/panda/internal/version.GitCommit=${SHA} \
            -X github.com/ethpandaops/panda/internal/version.BuildTime=${BUILD_TIME}"

          for GOARCH in amd64 arm64; do
            PLATFORM="linux/${GOARCH}"
            mkdir -p "${PLATFORM}"
            echo "Building for ${PLATFORM}..."
            CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} go build -ldflags "${LDFLAGS}" -o "${PLATFORM}/panda-server" ./cmd/server
            CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} go build -ldflags "${LDFLAGS}" -o "${PLATFORM}/panda" ./cmd/panda
            CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} go build -ldflags "${LDFLAGS}" -o "${PLATFORM}/panda-proxy" ./cmd/proxy
          done

      - name: Build and push server image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          TAGS_INPUT: ${{ inputs.server-tags }}
        run: |
          TAGS=""
          IFS=',' read -ra TAG_ARRAY <<< "${TAGS_INPUT}"
          for TAG in "${TAG_ARRAY[@]}"; do
            TAGS="${TAGS} --tag ${IMAGE}:${TAG}"
          done

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file goreleaser.server.Dockerfile \
            ${TAGS} \
            --push .

      - name: Build and push CLI image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          TAGS_INPUT: ${{ inputs.cli-tags }}
        run: |
          TAGS=""
          IFS=',' read -ra TAG_ARRAY <<< "${TAGS_INPUT}"
          for TAG in "${TAG_ARRAY[@]}"; do
            TAGS="${TAGS} --tag ${IMAGE}:${TAG}"
          done

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file goreleaser.panda.Dockerfile \
            ${TAGS} \
            --push .

      - name: Build and push proxy image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          TAGS_INPUT: ${{ inputs.proxy-tags }}
        run: |
          TAGS=""
          IFS=',' read -ra TAG_ARRAY <<< "${TAGS_INPUT}"
          for TAG in "${TAG_ARRAY[@]}"; do
            TAGS="${TAGS} --tag ${IMAGE}:${TAG}"
          done

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file goreleaser.proxy.Dockerfile \
            ${TAGS} \
            --push .

      - name: Build and push sandbox image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          TAGS_INPUT: ${{ inputs.sandbox-tags }}
        run: |
          TAGS=""
          IFS=',' read -ra TAG_ARRAY <<< "${TAGS_INPUT}"
          for TAG in "${TAG_ARRAY[@]}"; do
            TAGS="${TAGS} --tag ${IMAGE}:${TAG}"
          done

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file sandbox/Dockerfile \
            ${TAGS} \
            --push .
