version: 2
updates:
  # Go modules.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      go-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions — keeps the SHA-pinned actions current (Dependabot
  # understands pinned-SHA + version-comment refs and bumps both).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      actions:
        update-types:
          - minor
          - patch

  # Base images in the Dockerfiles.
  - package-ecosystem: docker
    directories:
      - "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
