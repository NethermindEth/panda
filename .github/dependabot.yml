version: 2
updates:
  # Go modules.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Only open a PR once a new version has been published for 14 days, to dodge
    # yanked releases and same-day supply-chain compromises.
    cooldown:
      default-days: 14
    groups:
      go-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions — keeps the SHA-pinned actions current (Dependabot
  # understands pinned-SHA + version-comment refs and bumps both).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 14
    # One grouped PR for all action updates (including majors) instead of a
    # separate PR per action.
    groups:
      actions:
        patterns:
          - "*"

  # Base images in the Dockerfiles (server image + sandbox image). The FROM
  # lines are digest-pinned; Dependabot bumps tag + digest together.
  - package-ecosystem: docker
    directories:
      - "/"
      - "/sandbox"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 14
    # One grouped PR for base-image bumps across both Dockerfiles.
    groups:
      docker:
        patterns:
          - "*"

  # Sandbox Python deps: requirements.in (intent) compiled to a hash-locked
  # requirements.txt with `uv pip compile --generate-hashes --universal`.
  # Dependabot understands the compiled pair and regenerates hashes on bump.
  - package-ecosystem: pip
    directory: "/sandbox"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 14
    # One grouped PR for all sandbox package updates.
    groups:
      sandbox-python:
        patterns:
          - "*"

  # opencode CLI lockfile used by the eval workflows (.github/opencode).
  - package-ecosystem: npm
    directory: "/.github/opencode"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 14
    groups:
      opencode:
        patterns:
          - "*"

  # Eval harness Python deps (tests/eval/uv.lock).
  - package-ecosystem: uv
    directory: "/tests/eval"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 14
    # One grouped PR for all eval-harness package updates.
    groups:
      eval-python:
        patterns:
          - "*"
