# Query examples for the xatu-cbt dataset.
# SQL examples set `target` to the ClickHouse datasource (cluster) they run
# against; Python examples (sandbox) omit it.

table_coverage:
  name: Table Coverage and Freshness
  description: >-
    How far back a table goes, how current it is, and whether it has gaps —
    ask the CBT pipeline that builds these tables instead of scanning them
  examples:
  - name: How far back does a table go and how fresh is it
    description: >-
      Get a table's covered time range (earliest data, latest data, gaps) from
      the pipeline's coverage metadata. Works for any table in this dataset;
      never answer "is data missing?" or "how far back does it go?" with a
      MIN/MAX table scan.
    query: |
      from datetime import datetime, timezone

      from ethpandaops import cbt

      network = "mainnet"
      coverage = cbt.get_transformation_coverage(network, f"{network}.fct_block")
      ranges = coverage.get("ranges", [])
      print(f"{len(ranges)} processed range(s); gaps between ranges are unprocessed")
      for r in ranges:
          start = datetime.fromtimestamp(r["position"], tz=timezone.utc)
          end = datetime.fromtimestamp(r["position"] + r["interval"], tz=timezone.utc)
          print(f"  {start} -> {end}")

block_timing:
  name: Block Timing Analysis
  description: Queries for analyzing block arrival and propagation times using clickhouse-refined aggregated
    data
  examples:
  - name: Average block arrival time
    description: Get the average block arrival time (seen_slot_start_diff) for recent slots.
    target: clickhouse-refined
    query: |
      SELECT
        avg(seen_slot_start_diff) as avg_arrival_ms,
        median(seen_slot_start_diff) as median_arrival_ms,
        min(seen_slot_start_diff) as min_arrival_ms,
        max(seen_slot_start_diff) as max_arrival_ms
      FROM {network}.fct_block_first_seen_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
  - name: Block arrival time percentiles
    description: Get percentile distribution of block arrival times.
    target: clickhouse-refined
    query: |
      SELECT
        quantile(0.05)(seen_slot_start_diff) as p5_ms,
        quantile(0.25)(seen_slot_start_diff) as p25_ms,
        quantile(0.50)(seen_slot_start_diff) as p50_ms,
        quantile(0.75)(seen_slot_start_diff) as p75_ms,
        quantile(0.95)(seen_slot_start_diff) as p95_ms
      FROM {network}.fct_block_first_seen_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
  - name: Block arrival time for last N slots
    description: Get block arrival stats aggregated per slot for the last 1000 slots.
    target: clickhouse-refined
    query: |
      SELECT
        slot,
        min(seen_slot_start_diff) as arrival_time_ms,
        count() as observations
      FROM {network}.fct_block_first_seen_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 4 HOUR
        AND slot >= (SELECT max(slot) - 999 FROM {network}.fct_block_first_seen_by_node FINAL WHERE slot_start_date_time >= now() - INTERVAL 4 HOUR)
      GROUP BY slot
      ORDER BY slot DESC
  - name: Block arrival by consensus client
    description: Compare block arrival times across different consensus clients.
    target: clickhouse-refined
    query: |
      SELECT
        meta_consensus_implementation as client,
        avg(seen_slot_start_diff) as avg_arrival_ms,
        quantile(0.95)(seen_slot_start_diff) as p95_arrival_ms,
        count() as observations
      FROM {network}.fct_block_first_seen_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY client
      ORDER BY avg_arrival_ms
block_properties:
  name: Block Properties (Execution Payload)
  description: Queries for analyzing block-level execution payload properties (gas, size, transactions)
    using the fct_block_head table on clickhouse-refined. Use fct_block_head for canonical block properties
    — NOT canonical_execution_block, fct_prepared_block, or fct_execution_block.
  examples:
  - name: Average gas used per block
    description: Get the average gas used per block over a recent time window. Use fct_block_head which
      contains execution_payload_gas_used.
    target: clickhouse-refined
    query: |
      SELECT
        COUNT() AS block_count,
        AVG(execution_payload_gas_used) AS avg_gas_used,
        MIN(execution_payload_gas_used) AS min_gas_used,
        MAX(execution_payload_gas_used) AS max_gas_used,
        quantile(0.50)(execution_payload_gas_used) AS median_gas_used
      FROM {network}.fct_block_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
  - name: Gas used per block over time
    description: Track gas usage per slot over time using fct_block_head.
    target: clickhouse-refined
    query: |
      SELECT
        slot,
        slot_start_date_time,
        execution_payload_gas_used AS gas_used,
        execution_payload_gas_limit AS gas_limit,
        execution_payload_gas_used / execution_payload_gas_limit AS gas_utilization
      FROM {network}.fct_block_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      ORDER BY slot DESC
  - name: Block size statistics
    description: Get block size statistics (in bytes) from fct_block_head. Use this for max/avg/min block
      size queries.
    target: clickhouse-refined
    query: |
      SELECT
        COUNT() AS block_count,
        AVG(block_total_bytes) AS avg_block_bytes,
        MAX(block_total_bytes) AS max_block_bytes,
        MIN(block_total_bytes) AS min_block_bytes,
        quantile(0.95)(block_total_bytes) AS p95_block_bytes
      FROM {network}.fct_block_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
block_status:
  name: Block Status (Orphans & Reorgs)
  description: Queries for analyzing orphaned and reorged blocks using the fct_block table on clickhouse-refined.
    Use fct_block for orphan/reorg queries — it has a `status` column with values like 'canonical' and
    'orphaned'. Do NOT use fct_block_canonical or fct_block_head for orphan detection. Note that fct_block
    does NOT include missed slots — only blocks that were actually produced.
  examples:
  - name: Orphaned block count
    description: Count orphaned (reorged) blocks over a time window using fct_block. Filter on status
      = 'orphaned'.
    target: clickhouse-refined
    query: |
      SELECT
        count() AS orphaned_blocks
      FROM {network}.fct_block FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 24 HOUR
        AND status = 'orphaned'
  - name: Orphaned blocks over time
    description: Track orphaned blocks per hour using fct_block.
    target: clickhouse-refined
    query: |
      SELECT
        toStartOfHour(slot_start_date_time) AS hour,
        countIf(status = 'orphaned') AS orphaned_blocks,
        countIf(status = 'canonical') AS canonical_blocks,
        orphaned_blocks * 100.0 / (orphaned_blocks + canonical_blocks) AS orphan_rate_pct
      FROM {network}.fct_block FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 24 HOUR
      GROUP BY hour
      ORDER BY hour DESC
  - name: Investigate a specific orphaned block
    description: Investigate why a specific block was orphaned by checking its status in fct_block and
      arrival timing in fct_block_first_seen_by_node. Use fct_block for finalized chain analysis (has
      status column), fct_block_first_seen_by_node for when nodes saw it.
    target: clickhouse-refined
    query: |
      SELECT
        b.slot,
        b.status,
        b.block_root,
        b.parent_root,
        b.proposer_index,
        b.execution_payload_transactions_count AS tx_count,
        b.execution_payload_blob_gas_used AS blob_gas_used,
        MIN(t.seen_slot_start_diff) AS first_seen_ms,
        AVG(t.seen_slot_start_diff) AS avg_arrival_ms,
        MAX(t.seen_slot_start_diff) AS last_seen_ms,
        COUNT(DISTINCT t.node_id) AS nodes_observed
      FROM (
        SELECT slot, status, block_root, parent_root, proposer_index,
               execution_payload_transactions_count, execution_payload_blob_gas_used
        FROM {network}.fct_block FINAL
        WHERE slot_start_date_time >= now() - INTERVAL 24 HOUR AND status = 'orphaned'
      ) b
      GLOBAL LEFT JOIN (
        SELECT slot, block_root, seen_slot_start_diff, node_id
        FROM {network}.fct_block_first_seen_by_node FINAL
        WHERE slot_start_date_time >= now() - INTERVAL 24 HOUR
      ) t ON b.slot = t.slot AND b.block_root = t.block_root
      GROUP BY b.slot, b.status, b.block_root, b.parent_root, b.proposer_index, tx_count, blob_gas_used
      ORDER BY b.slot DESC
      LIMIT 10
  - name: Parent distance distribution (stale parent detection)
    description: Detect stale parent usage by measuring the slot gap between blocks and their parents.
      A parent distance > 1 means missed slots were skipped. Use fct_block with a self-join on parent_root
      to resolve parent slot.
    target: clickhouse-refined
    query: |
      SELECT
        child.slot - parent.slot AS parent_distance,
        count() AS block_count,
        count() * 100.0 / sum(count()) OVER () AS percentage
      FROM (
        SELECT slot, parent_root
        FROM {network}.fct_block FINAL
        WHERE slot_start_date_time >= now() - INTERVAL 24 HOUR AND status = 'canonical'
      ) child
      GLOBAL INNER JOIN (
        SELECT slot, block_root
        FROM {network}.fct_block FINAL
        WHERE slot_start_date_time >= now() - INTERVAL 25 HOUR AND status = 'canonical'
      ) parent ON child.parent_root = parent.block_root
      GROUP BY parent_distance
      ORDER BY parent_distance
network_health:
  name: Network Health Monitoring
  description: Queries used for monitoring Ethereum network health, derived from production alerting rules
  examples:
  - name: Attestation participation rate
    description: Calculate attestation participation using pre-aggregated vote totals. votes_max
      is scheduled duties; votes_head plus votes_other is observed attestations.
    target: clickhouse-refined
    query: |
      SELECT
        slot_start_date_time,
        slot,
        votes_max AS total_scheduled_votes,
        votes_head AS votes_for_current_slot_block,
        votes_other AS votes_for_other_blocks,
        (votes_head + votes_other) AS total_votes,
        ((votes_head + votes_other) / votes_max) AS participation_rate
      FROM {network}.fct_attestation_correctness_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      ORDER BY slot_start_date_time DESC
  - name: Attestation correctness rate
    description: Calculate the percentage of observed attestations whose head vote was correct using
      the vote-correctness outcome columns.
    target: clickhouse-refined
    query: |
      SELECT
        slot_start_date_time,
        slot,
        COUNT() AS total_duties,
        countIf(attested = 1) AS observed_attestations,
        countIf(head_correct = 1) AS correct_head_votes,
        countIf(head_correct = 0) AS incorrect_head_votes,
        countIf(attested = 0) AS missed_duties,
        if(observed_attestations > 0,
           correct_head_votes * 100.0 / observed_attestations,
           0) AS correctness_percentage
      FROM {network}.fct_attestation_vote_correctness_by_validator FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY slot_start_date_time, slot
      ORDER BY slot_start_date_time DESC
  - name: Current-slot vote share
    description: Calculate what fraction of observed attestations pointed to the current slot's block.
      This is a vote-distance metric, not head-vote correctness.
    target: clickhouse-refined
    query: |
      SELECT
        toStartOfHour(slot_start_date_time) AS hour,
        SUM(votes_head) AS total_current_slot_votes,
        SUM(votes_other) AS total_other_votes,
        SUM(votes_head + votes_other) AS total_votes,
        if(total_votes > 0,
           total_current_slot_votes * 100.0 / total_votes,
           0) AS current_slot_vote_pct
      FROM {network}.fct_attestation_correctness_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 6 HOUR
        AND votes_max > 0
      GROUP BY hour
      ORDER BY hour DESC
  - name: Block arrival time by node
    description: Get block arrival times (seen_slot_start_diff) per node. Useful for identifying slow
      nodes or network issues.
    target: clickhouse-refined
    query: |
      SELECT
        slot_start_date_time,
        slot,
        meta_client_name,
        meta_consensus_implementation,
        meta_client_geo_country,
        seen_slot_start_diff AS arrival_time_ms
      FROM {network}.fct_block_first_seen_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 5 MINUTE
      ORDER BY slot_start_date_time DESC, arrival_time_ms ASC
  - name: Minimum block arrival time per slot
    description: Get the minimum (fastest) block arrival time per slot across all nodes.
    target: clickhouse-refined
    query: |
      SELECT
        slot_start_date_time,
        slot,
        MIN(seen_slot_start_diff) AS min_arrival_ms,
        quantile(0.50)(seen_slot_start_diff) AS p50_arrival_ms,
        quantile(0.95)(seen_slot_start_diff) AS p95_arrival_ms,
        COUNT(DISTINCT node_id) AS reporting_nodes
      FROM {network}.fct_block_first_seen_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY slot_start_date_time, slot
      ORDER BY slot_start_date_time DESC
  - name: Block arrival comparison across consensus clients
    description: Compare block arrival times across consensus client implementations for network health
      monitoring.
    target: clickhouse-refined
    query: |
      SELECT
        meta_consensus_implementation AS client,
        AVG(seen_slot_start_diff) AS avg_arrival_ms,
        quantile(0.50)(seen_slot_start_diff) AS p50_arrival_ms,
        quantile(0.95)(seen_slot_start_diff) AS p95_arrival_ms,
        COUNT() AS observations,
        COUNT(DISTINCT node_id) AS unique_nodes
      FROM {network}.fct_block_first_seen_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY client
      ORDER BY avg_arrival_ms ASC
  - name: Block arrival by country
    description: Compare block arrival times across different geographic locations.
    target: clickhouse-refined
    query: |
      SELECT
        meta_client_geo_country AS country,
        AVG(seen_slot_start_diff) AS avg_arrival_ms,
        quantile(0.50)(seen_slot_start_diff) AS p50_arrival_ms,
        quantile(0.95)(seen_slot_start_diff) AS p95_arrival_ms,
        COUNT() AS observations,
        COUNT(DISTINCT node_id) AS unique_nodes
      FROM {network}.fct_block_first_seen_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
        AND meta_client_geo_country != ''
      GROUP BY country
      ORDER BY avg_arrival_ms ASC
  - name: Locally built blocks by client
    description: Track locally prepared/built blocks per consensus client using the pre-aggregated fct_prepared_block
      table.
    target: clickhouse-refined
    query: |
      SELECT
        meta_consensus_implementation AS consensus_client,
        MAX(slot_start_date_time) AS last_block_time,
        dateDiff('second', MAX(slot_start_date_time), now()) AS seconds_since_last_block,
        COUNT() AS blocks_in_window,
        AVG(execution_payload_gas_used) AS avg_gas_used,
        AVG(execution_payload_transactions_count) AS avg_tx_count
      FROM {network}.fct_prepared_block FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 30 MINUTE
      GROUP BY consensus_client
      ORDER BY consensus_client
  - name: Validator committee size per slot
    description: Get the total validators scheduled per slot from committee data.
    target: clickhouse-refined
    query: |
      SELECT
        slot_start_date_time,
        slot,
        SUM(length(validators)) AS total_validators,
        COUNT() AS committee_count
      FROM {network}.int_beacon_committee_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY slot_start_date_time, slot
      ORDER BY slot_start_date_time DESC
  - name: Epoch participation summary
    description: Summarize attestation participation per epoch using pre-aggregated data.
    target: clickhouse-refined
    query: |
      SELECT
        epoch,
        epoch_start_date_time,
        SUM(votes_max) AS total_scheduled,
        SUM(votes_head) AS total_current_slot_votes,
        SUM(votes_other) AS total_other_votes,
        SUM(votes_head + votes_other) AS total_actual_votes,
        SUM(votes_head + votes_other) / SUM(votes_max) AS participation_rate,
        if(total_actual_votes > 0,
           total_current_slot_votes / total_actual_votes,
           0) AS current_slot_vote_share
      FROM {network}.fct_attestation_correctness_head FINAL
      WHERE epoch_start_date_time >= now() - INTERVAL 1 DAY
        AND slot_start_date_time >= now() - INTERVAL 1 DAY
      GROUP BY epoch, epoch_start_date_time
      ORDER BY epoch DESC
  - name: Missed slots count
    description: Count missed slots (where no block was proposed) in a time window. Uses fct_block_head
      alone — compare the expected slot range to actual slots present. No join to proposer entity needed
      for a simple count.
    target: clickhouse-refined
    query: |
      SELECT
        (max(slot) - min(slot) + 1) AS total_slots_in_range,
        count(DISTINCT slot) AS proposed_slots,
        (max(slot) - min(slot) + 1) - count(DISTINCT slot) AS missed_slots,
        ((max(slot) - min(slot) + 1) - count(DISTINCT slot)) * 100.0 / (max(slot) - min(slot) + 1) AS missed_rate_pct
      FROM {network}.fct_block_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 24 HOUR
  - name: Missed slots per hour
    description: Track missed slot rate per hour using fct_block_head. Each hour has 300 expected slots
      (3600s / 12s).
    target: clickhouse-refined
    query: |
      SELECT
        toStartOfHour(slot_start_date_time) AS hour,
        300 AS expected_slots,
        count(DISTINCT slot) AS proposed_slots,
        300 - count(DISTINCT slot) AS missed_slots,
        (300 - count(DISTINCT slot)) * 100.0 / 300 AS missed_rate_pct
      FROM {network}.fct_block_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 24 HOUR
      GROUP BY hour
      ORDER BY hour DESC
entity_analysis:
  name: Entity Analysis
  description: Queries for analyzing staking entities (operators, pools, exchanges) and their performance.
    For entity-level liveness, use fct_attestation_liveness_by_entity_head (pre-aggregated by entity).
    For entity-level head correctness, aggregate fct_attestation_vote_correctness_by_validator joined with
    ethseer_validator_entity — there is no pre-aggregated correctness-by-entity table. For block proposals
    by entity, use fct_block_proposer_entity.
  examples:
  - name: Entity attestation liveness ranking
    description: Rank staking entities by attestation liveness (attestations vs missed).
    target: clickhouse-refined
    query: |
      SELECT
        entity,
        SUM(attestation_count) AS total_attestations,
        SUM(missed_count) AS total_missed,
        SUM(attestation_count) + SUM(missed_count) AS total_duties,
        SUM(attestation_count) / (SUM(attestation_count) + SUM(missed_count)) AS liveness_rate
      FROM {network}.fct_attestation_liveness_by_entity_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
      GROUP BY entity
      ORDER BY total_attestations DESC
  - name: Entity attestation liveness over time
    description: Track attestation liveness per entity over time (hourly).
    target: clickhouse-refined
    query: |
      SELECT
        toStartOfHour(slot_start_date_time) AS hour,
        entity,
        SUM(attestation_count) AS attestations,
        SUM(missed_count) AS missed,
        SUM(attestation_count) / (SUM(attestation_count) + SUM(missed_count)) AS liveness_rate
      FROM {network}.fct_attestation_liveness_by_entity_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
        AND entity != 'unknown'
      GROUP BY hour, entity
      ORDER BY hour DESC, attestations DESC
  - name: Entity performance comparison (liveness + correctness)
    description: Compare staking entities by both attestation liveness and head correctness. Use fct_attestation_liveness_by_entity_head
      for liveness. For entity-level correctness, aggregate fct_attestation_vote_correctness_by_validator
      joined with ethseer_validator_entity (there is no pre-aggregated correctness-by-entity table).
    target: clickhouse-refined
    query: |
      WITH liveness AS (
        SELECT
          entity,
          SUM(attestation_count) AS total_attestations,
          SUM(missed_count) AS total_missed,
          SUM(attestation_count) / (SUM(attestation_count) + SUM(missed_count)) AS liveness_rate
        FROM {network}.fct_attestation_liveness_by_entity_head FINAL
        WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
        GROUP BY entity
      ),
      correctness AS (
        SELECT
          e.entity,
          countIf(c.attested = 1) AS observed_attestations,
          countIf(c.head_correct = 1) AS correct_head_votes,
          if(observed_attestations > 0, correct_head_votes / observed_attestations, 0) AS correctness_rate
        FROM (
          SELECT validator_index, attested, head_correct
          FROM {network}.fct_attestation_vote_correctness_by_validator FINAL
          WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
        ) c
        GLOBAL INNER JOIN (
          SELECT validator_index, source AS entity
          FROM {network}.dim_node FINAL
          WHERE validator_index > 0
        ) e ON c.validator_index = e.validator_index
        GROUP BY e.entity
        HAVING observed_attestations > 0
      )
      SELECT
        l.entity,
        l.liveness_rate,
        c.correctness_rate,
        l.total_attestations
      FROM liveness l
      JOIN correctness c ON l.entity = c.entity
      WHERE l.entity != 'unknown'
      ORDER BY l.total_attestations DESC
      LIMIT 10
  - name: Entity block proposals
    description: Count block proposals per staking entity.
    target: clickhouse-refined
    query: |
      SELECT
        entity,
        COUNT() AS blocks_proposed,
        COUNT(DISTINCT epoch) AS epochs_active,
        MIN(slot_start_date_time) AS first_block,
        MAX(slot_start_date_time) AS last_block
      FROM {network}.fct_block_proposer_entity FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
      GROUP BY entity
      ORDER BY blocks_proposed DESC
  - name: Entity missed slots
    description: Identify entities with missed block proposals by comparing scheduled vs proposed.
    target: clickhouse-refined
    query: |
      WITH scheduled AS (
        SELECT
          entity,
          COUNT() AS scheduled_blocks
        FROM {network}.fct_block_proposer_entity FINAL
        WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
        GROUP BY entity
      ),
      proposed AS (
        SELECT
          e.entity,
          COUNT() AS proposed_blocks
        FROM (
          SELECT slot, entity
          FROM {network}.fct_block_proposer_entity FINAL
          WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
        ) e
        GLOBAL INNER JOIN (
          SELECT slot
          FROM {network}.fct_block_head FINAL
          WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
        ) b ON e.slot = b.slot
        GROUP BY e.entity
      )
      SELECT
        s.entity,
        s.scheduled_blocks,
        COALESCE(p.proposed_blocks, 0) AS proposed_blocks,
        s.scheduled_blocks - COALESCE(p.proposed_blocks, 0) AS missed_blocks,
        COALESCE(p.proposed_blocks, 0) / s.scheduled_blocks AS proposal_rate
      FROM scheduled s
      LEFT JOIN proposed p ON s.entity = p.entity
      ORDER BY missed_blocks DESC
  - name: Top staking entities by validator count
    description: Estimate validator count per entity from attestation duties.
    target: clickhouse-refined
    query: |
      SELECT
        entity,
        SUM(attestation_count + missed_count) AS total_duties,
        -- Each validator has 1 attestation duty per epoch (~225 duties/day); missed duties are included here.
        SUM(attestation_count + missed_count) / 225 AS estimated_validators,
        SUM(attestation_count) / (SUM(attestation_count) + SUM(missed_count)) AS liveness_rate
      FROM {network}.fct_attestation_liveness_by_entity_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
      GROUP BY entity
      ORDER BY total_duties DESC
      LIMIT 30
  - name: Head vote accuracy by entity vs blob count
    description: Correlate head vote correctness with blob count per entity (e.g., Lido CSM, Rocketpool).
      Uses fct_attestation_vote_correctness_by_validator for per-validator correctness,
      ethseer_validator_entity to map validators to entities, and fct_block_blob_count_head for blob
      counts per slot.
    target: clickhouse-refined
    query: |
      WITH entity_correctness AS (
        SELECT
          c.slot,
          e.entity,
          countIf(c.attested = 1) AS observed_attestations,
          countIf(c.head_correct = 1) AS correct_head_votes
        FROM (
          SELECT slot, validator_index, attested, head_correct
          FROM {network}.fct_attestation_vote_correctness_by_validator FINAL
          WHERE slot_start_date_time >= now() - INTERVAL 6 HOUR
        ) c
        GLOBAL INNER JOIN (
          SELECT validator_index, source AS entity
          FROM {network}.dim_node FINAL
          WHERE validator_index > 0 AND source IN ('lido', 'rocketpool', 'solo_stakers')
        ) e ON c.validator_index = e.validator_index
        GROUP BY c.slot, e.entity
        HAVING observed_attestations > 0
      )
      SELECT
        b.blob_count,
        ec.entity,
        AVG(ec.correct_head_votes * 100.0 / ec.observed_attestations) AS avg_head_accuracy_pct,
        count() AS slot_count
      FROM entity_correctness ec
      GLOBAL INNER JOIN (
        SELECT slot, blob_count
        FROM {network}.fct_block_blob_count_head FINAL
        WHERE slot_start_date_time >= now() - INTERVAL 6 HOUR
      ) b ON ec.slot = b.slot
      GROUP BY b.blob_count, ec.entity
      ORDER BY b.blob_count, ec.entity
  - name: Timing games by entity
    description: Identify entities that consistently propose blocks late (timing games to capture more
      MEV). Uses fct_block_first_seen_by_node for arrival timing and fct_block_proposer_entity for entity
      identity. These two tables are sufficient — do not add fct_block_mev_head or fct_prepared_block.
    target: clickhouse-refined
    query: |
      SELECT
        e.entity,
        AVG(b.seen_slot_start_diff) AS avg_arrival_ms,
        quantile(0.50)(b.seen_slot_start_diff) AS p50_arrival_ms,
        quantile(0.95)(b.seen_slot_start_diff) AS p95_arrival_ms,
        COUNT(DISTINCT b.slot) AS slots_proposed
      FROM (
        SELECT slot, seen_slot_start_diff
        FROM {network}.fct_block_first_seen_by_node FINAL
        WHERE slot_start_date_time >= now() - INTERVAL 24 HOUR
      ) b
      GLOBAL INNER JOIN (
        SELECT slot, entity
        FROM {network}.fct_block_proposer_entity FINAL
        WHERE slot_start_date_time >= now() - INTERVAL 24 HOUR AND entity != 'unknown'
      ) e ON b.slot = e.slot
      GROUP BY e.entity
      HAVING slots_proposed >= 10
      ORDER BY avg_arrival_ms DESC
      LIMIT 20
mev_analysis:
  name: MEV Analysis
  description: Queries for analyzing MEV (Maximal Extractable Value) activity including relays, builders,
    and block values. For relay-level market share use fct_block_mev_head (clickhouse-refined). For individual
    bid data (values, builder pubkeys, bid traces) use mev_relay_bid_trace (clickhouse-raw) — the value
    column is in wei (UInt256). For validator registrations use mev_relay_validator_registration (clickhouse-raw).
    For bid count trends use fct_mev_bid_count_by_relay and fct_mev_bid_count_by_builder (clickhouse-refined).
    For highest bid value timing use fct_mev_bid_highest_value_by_builder_chunked_50ms (clickhouse-refined).
  examples:
  - name: MEV relay activity
    description: Analyze MEV relay bid activity per slot.
    target: clickhouse-refined
    query: |
      SELECT
        relay_name,
        SUM(bid_total) AS total_bids,
        AVG(bid_total) AS avg_bids_per_slot,
        COUNT(DISTINCT slot) AS slots_with_bids
      FROM {network}.fct_mev_bid_count_by_relay FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
      GROUP BY relay_name
      ORDER BY total_bids DESC
  - name: MEV builder activity
    description: Analyze MEV builder bid activity.
    target: clickhouse-refined
    query: |
      SELECT
        builder_pubkey,
        SUM(bid_total) AS total_bids,
        AVG(bid_total) AS avg_bids_per_slot,
        COUNT(DISTINCT slot) AS slots_active
      FROM {network}.fct_mev_bid_count_by_builder FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
      GROUP BY builder_pubkey
      ORDER BY total_bids DESC
      LIMIT 20
  - name: MEV block value distribution
    description: Analyze the distribution of MEV block values.
    target: clickhouse-refined
    query: |
      SELECT
        toStartOfHour(slot_start_date_time) AS hour,
        COUNT() AS mev_blocks,
        AVG(value) / 1e18 AS avg_value_eth,
        quantile(0.50)(value) / 1e18 AS median_value_eth,
        quantile(0.95)(value) / 1e18 AS p95_value_eth,
        MAX(value) / 1e18 AS max_value_eth,
        SUM(value) / 1e18 AS total_value_eth
      FROM {network}.fct_block_mev_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
        AND value IS NOT NULL
      GROUP BY hour
      ORDER BY hour DESC
  - name: Top MEV blocks by value
    description: Find the highest value MEV blocks.
    target: clickhouse-refined
    query: |
      SELECT
        slot,
        slot_start_date_time,
        block_number,
        value / 1e18 AS value_eth,
        builder_pubkey,
        relay_names,
        transaction_count,
        gas_used
      FROM {network}.fct_block_mev_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
        AND value IS NOT NULL
      ORDER BY value DESC
      LIMIT 20
  - name: MEV relay market share
    description: Calculate MEV relay market share by delivered blocks.
    target: clickhouse-refined
    query: |
      SELECT
        arrayJoin(relay_names) AS relay,
        COUNT() AS blocks_delivered,
        SUM(value) / 1e18 AS total_value_eth,
        AVG(value) / 1e18 AS avg_value_eth
      FROM {network}.fct_block_mev_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
        AND value IS NOT NULL
      GROUP BY relay
      ORDER BY blocks_delivered DESC
  - name: Builder market share
    description: Calculate builder market share by block count and value.
    target: clickhouse-refined
    query: |
      SELECT
        builder_pubkey,
        COUNT() AS blocks_built,
        SUM(value) / 1e18 AS total_value_eth,
        AVG(value) / 1e18 AS avg_value_eth,
        AVG(transaction_count) AS avg_tx_count,
        AVG(gas_used) AS avg_gas_used
      FROM {network}.fct_block_mev_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
        AND value IS NOT NULL
      GROUP BY builder_pubkey
      ORDER BY blocks_built DESC
      LIMIT 20
  - name: MEV vs local block comparison
    description: Compare MEV blocks vs locally built blocks in terms of value and gas usage.
    target: clickhouse-refined
    query: |
      WITH mev_stats AS (
        SELECT
          'mev' AS block_type,
          COUNT() AS block_count,
          AVG(value) / 1e18 AS avg_value_eth,
          AVG(gas_used) AS avg_gas_used,
          AVG(transaction_count) AS avg_tx_count
        FROM {network}.fct_block_mev_head FINAL
        WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
          AND value IS NOT NULL
      ),
      local_stats AS (
        SELECT
          'local' AS block_type,
          COUNT() AS block_count,
          AVG(execution_payload_value) / 1e18 AS avg_value_eth,
          AVG(execution_payload_gas_used) AS avg_gas_used,
          AVG(execution_payload_transactions_count) AS avg_tx_count
        FROM {network}.fct_prepared_block FINAL
        WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
      )
      SELECT * FROM mev_stats
      UNION ALL
      SELECT * FROM local_stats
  - name: Hourly MEV activity trend
    description: Track MEV activity trends by hour including bid counts and block values.
    target: clickhouse-refined
    query: |
      SELECT
        toStartOfHour(slot_start_date_time) AS hour,
        COUNT() AS mev_blocks,
        SUM(value) / 1e18 AS total_value_eth,
        AVG(value) / 1e18 AS avg_value_eth,
        COUNT(DISTINCT builder_pubkey) AS unique_builders
      FROM {network}.fct_block_mev_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
        AND value IS NOT NULL
      GROUP BY hour
      ORDER BY hour DESC
head_accuracy:
  name: Head Vote Accuracy
  description: Queries for analyzing attestation duty outcomes, head vote correctness among observed
    attestations, inclusion delays, and propagation timing. Use explicit correctness outcomes for
    correctness rates; distance fields are for distance and timing analysis.
  examples:
  - name: Head vote accuracy by slot
    description: Calculate the percentage of observed attestations whose head vote was correct per slot.
    target: clickhouse-refined
    query: |
      SELECT
        slot_start_date_time,
        slot,
        COUNT() AS total_duties,
        countIf(attested = 1) AS observed_attestations,
        countIf(head_correct = 1) AS correct_head_votes,
        countIf(head_correct = 0) AS incorrect_head_votes,
        countIf(attested = 0) AS missed_duties,
        if(observed_attestations > 0, correct_head_votes * 100.0 / observed_attestations, 0) AS head_accuracy_pct
      FROM {network}.fct_attestation_vote_correctness_by_validator FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY slot_start_date_time, slot
      ORDER BY slot_start_date_time DESC
  - name: Head vote accuracy summary
    description: Overall head vote accuracy metrics for a time period. Accuracy percentages exclude missed
      duties; missed_duty_pct reports duties with no observed attestation.
    target: clickhouse-refined
    query: |
      SELECT
        COUNT() AS total_duties,
        countIf(attested = 1) AS observed_attestations,
        countIf(head_correct = 1) AS correct_head_votes,
        countIf(head_correct = 0) AS incorrect_head_votes,
        if(observed_attestations > 0, correct_head_votes * 100.0 / observed_attestations, 0) AS head_accuracy_pct,
        countIf(attested = 0) * 100.0 / COUNT() AS missed_duty_pct
      FROM {network}.fct_attestation_vote_correctness_by_validator FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
  - name: Slot distance distribution
    description: Distribution of head-vote distances. Use this for distance analysis, not correctness.
    target: clickhouse-refined
    query: |
      SELECT
        slot_distance,
        COUNT() AS duty_count,
        COUNT() * 100.0 / SUM(COUNT()) OVER () AS percentage
      FROM {network}.fct_attestation_correctness_by_validator_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY slot_distance
      ORDER BY slot_distance
  - name: Propagation timing distribution
    description: When observed attestations were propagated relative to their duty slot (0 = same slot,
      ideal). Missed duties have null propagation_distance and are excluded.
    target: clickhouse-refined
    query: |
      SELECT
        propagation_distance,
        COUNT() AS observed_attestation_count,
        COUNT() * 100.0 / SUM(COUNT()) OVER () AS percentage
      FROM {network}.fct_attestation_correctness_by_validator_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
        AND propagation_distance IS NOT NULL
      GROUP BY propagation_distance
      ORDER BY propagation_distance
  - name: Attestation inclusion delay distribution
    description: How many slots after the attestation duty an included canonical attestation was included
      in a block (1 = optimal).
    target: clickhouse-refined
    query: |
      SELECT
        inclusion_distance,
        COUNT() AS included_attestation_count,
        COUNT() * 100.0 / SUM(COUNT()) OVER () AS percentage
      FROM {network}.fct_attestation_correctness_by_validator_canonical FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
        AND status = 'canonical'
      GROUP BY inclusion_distance
      ORDER BY inclusion_distance
  - name: Attestation status breakdown
    description: Breakdown of scheduled attestation duty outcomes - canonical (included), missed, orphaned.
      Use this before counting rows from the canonical correctness table.
    target: clickhouse-refined
    query: |
      SELECT
        status,
        COUNT() AS duty_count,
        COUNT() * 100.0 / SUM(COUNT()) OVER () AS percentage
      FROM {network}.fct_attestation_correctness_by_validator_canonical FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY status
      ORDER BY duty_count DESC
  - name: Head accuracy over time (hourly)
    description: Track observed head vote accuracy and missed duty rate by hour.
    target: clickhouse-refined
    query: |
      SELECT
        hour_start_date_time AS hour,
        SUM(total_duties) AS total_duties,
        SUM(attested_count) AS observed_attestations,
        SUM(head_correct_count) AS correct_head_votes,
        observed_attestations - correct_head_votes AS incorrect_head_votes,
        SUM(missed_count) AS missed_duties,
        if(observed_attestations > 0, correct_head_votes * 100.0 / observed_attestations, 0) AS head_accuracy_pct,
        missed_duties * 100.0 / total_duties AS missed_duty_pct
      FROM {network}.fct_attestation_vote_correctness_by_validator_hourly FINAL
      WHERE hour_start_date_time >= now() - INTERVAL 1 DAY
      GROUP BY hour
      ORDER BY hour DESC
  - name: Validators with poor head accuracy
    description: Find validators with below-average head vote accuracy (potential issues).
    target: clickhouse-refined
    query: |
      SELECT
        validator_index,
        SUM(total_duties) AS total_duties,
        SUM(attested_count) AS observed_attestations,
        SUM(head_correct_count) AS correct_head_votes,
        observed_attestations - correct_head_votes AS incorrect_head_votes,
        SUM(missed_count) AS missed_duties,
        if(observed_attestations > 0, correct_head_votes * 100.0 / observed_attestations, 0) AS head_accuracy_pct
      FROM {network}.fct_attestation_vote_correctness_by_validator_hourly FINAL
      WHERE hour_start_date_time >= now() - INTERVAL 1 DAY
      GROUP BY validator_index
      HAVING observed_attestations > 0 AND head_accuracy_pct < 95
      ORDER BY head_accuracy_pct ASC
      LIMIT 100
  - name: Validators with high inclusion delay
    description: Find validators whose attestations are consistently included late.
    target: clickhouse-refined
    query: |
      SELECT
        attesting_validator_index,
        COUNT() AS included_attestations,
        AVG(inclusion_distance) AS avg_inclusion_delay,
        countIf(inclusion_distance = 1) * 100.0 / COUNT() AS optimal_inclusion_pct,
        countIf(inclusion_distance > 1) * 100.0 / COUNT() AS delayed_pct
      FROM {network}.fct_attestation_correctness_by_validator_canonical FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
        AND status = 'canonical'
      GROUP BY attesting_validator_index
      HAVING avg_inclusion_delay > 1.5
      ORDER BY avg_inclusion_delay DESC
      LIMIT 100
  - name: Epoch head accuracy summary
    description: Observed head vote accuracy and missed duty rate aggregated by epoch.
    target: clickhouse-refined
    query: |
      SELECT
        intDiv(slot, 32) AS epoch,
        MIN(slot_start_date_time) AS first_slot_start_date_time,
        COUNT() AS total_duties,
        countIf(attested = 1) AS observed_attestations,
        countIf(head_correct = 1) AS correct_head_votes,
        countIf(head_correct = 0) AS incorrect_head_votes,
        countIf(attested = 0) AS missed_duties,
        if(observed_attestations > 0, correct_head_votes * 100.0 / observed_attestations, 0) AS head_accuracy_pct,
        missed_duties * 100.0 / total_duties AS missed_duty_pct
      FROM {network}.fct_attestation_vote_correctness_by_validator FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
      GROUP BY epoch
      ORDER BY epoch DESC
  - name: Slots with low head accuracy
    description: Identify slots where head vote accuracy dropped significantly (potential reorgs or issues).
    target: clickhouse-refined
    query: |
      SELECT
        slot_start_date_time,
        slot,
        COUNT() AS total_duties,
        countIf(attested = 1) AS observed_attestations,
        countIf(head_correct = 1) AS correct_head_votes,
        countIf(head_correct = 0) AS incorrect_head_votes,
        countIf(attested = 0) AS missed_duties,
        if(observed_attestations > 0, correct_head_votes * 100.0 / observed_attestations, 0) AS head_accuracy_pct
      FROM {network}.fct_attestation_vote_correctness_by_validator FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
      GROUP BY slot_start_date_time, slot
      HAVING observed_attestations > 0 AND head_accuracy_pct < 95
      ORDER BY head_accuracy_pct ASC
      LIMIT 50
  - name: Combined head and inclusion metrics
    description: Comprehensive view combining head accuracy and inclusion timing per slot.
    target: clickhouse-refined
    query: |
      WITH head_stats AS (
        SELECT
          slot,
          slot_start_date_time,
          COUNT() AS total_duties,
          countIf(attested = 1) AS observed_attestations,
          countIf(head_correct = 1) AS correct_head_votes,
          countIf(head_correct = 0) AS incorrect_head_votes,
          countIf(attested = 0) AS missed_duties,
          if(observed_attestations > 0, correct_head_votes * 100.0 / observed_attestations, 0) AS head_accuracy_pct,
          missed_duties * 100.0 / total_duties AS missed_duty_pct
        FROM {network}.fct_attestation_vote_correctness_by_validator FINAL
        WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
        GROUP BY slot, slot_start_date_time
      ),
      canonical_stats AS (
        SELECT
          slot,
          COUNT() AS total_duties,
          countIf(status = 'canonical') AS included_attestations,
          included_attestations * 100.0 / total_duties AS inclusion_rate_pct,
          avgIf(inclusion_distance, status = 'canonical') AS avg_inclusion_delay
        FROM {network}.fct_attestation_correctness_by_validator_canonical FINAL
        WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
        GROUP BY slot
      )
      SELECT
        h.slot,
        h.slot_start_date_time,
        h.total_duties,
        h.observed_attestations,
        h.head_accuracy_pct,
        h.missed_duty_pct,
        c.inclusion_rate_pct,
        c.avg_inclusion_delay
      FROM head_stats h
      LEFT JOIN canonical_stats c ON h.slot = c.slot
      ORDER BY h.slot_start_date_time DESC
blob_analysis:
  name: Blob Analysis
  description: Queries for analyzing EIP-4844 blob data including blob counts, submitters, and L2 rollup
    activity. For blob counts and submitter identity, use dim_block_blob_submitter (clickhouse-refined).
    For blob content analysis (empty blobs, blob sizes), use canonical_beacon_blob_sidecar (clickhouse-raw)
    which has blob_size and blob_empty_size columns. Cross-datasource joins require two separate queries.
  examples:
  - name: Blob count per slot
    description: Get the number of blobs in each slot.
    target: clickhouse-refined
    query: |
      SELECT
        slot_start_date_time,
        slot,
        blob_count
      FROM {network}.fct_block_blob_count_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      ORDER BY slot_start_date_time DESC
  - name: Blob count distribution
    description: Distribution of blob counts across slots
    target: clickhouse-refined
    query: |
      SELECT
        blob_count,
        COUNT() AS slot_count,
        COUNT() * 100.0 / SUM(COUNT()) OVER () AS percentage
      FROM {network}.fct_block_blob_count_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
      GROUP BY blob_count
      ORDER BY blob_count
  - name: Average blobs per slot over time
    description: Track blob usage trends by hour.
    target: clickhouse-refined
    query: |
      SELECT
        toStartOfHour(slot_start_date_time) AS hour,
        AVG(blob_count) AS avg_blobs_per_slot,
        SUM(blob_count) AS total_blobs,
        COUNT() AS slots,
        MAX(blob_count) AS max_blobs_in_slot
      FROM {network}.fct_block_blob_count_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
      GROUP BY hour
      ORDER BY hour DESC
  - name: Blob submitters ranking
    description: Top blob submitters (L2 rollups and other users) by blob count.
    target: clickhouse-refined
    query: |
      SELECT
        name,
        address,
        COUNT() AS submission_count,
        SUM(length(versioned_hashes)) AS total_blobs
      FROM {network}.dim_block_blob_submitter FINAL
      WHERE updated_date_time >= now() - INTERVAL 1 DAY
        AND block_number > 0
      GROUP BY name, address
      ORDER BY total_blobs DESC
      LIMIT 20
  - name: Blob submitters over time
    description: Track blob submission activity by submitter over time (hourly).
    target: clickhouse-refined
    query: |
      SELECT
        toStartOfHour(updated_date_time) AS hour,
        name,
        COUNT() AS submissions,
        SUM(length(versioned_hashes)) AS blobs
      FROM {network}.dim_block_blob_submitter FINAL
      WHERE updated_date_time >= now() - INTERVAL 1 DAY
        AND block_number > 0
        AND name IS NOT NULL
      GROUP BY hour, name
      ORDER BY hour DESC, blobs DESC
  - name: L2 rollup blob market share
    description: Calculate blob market share by L2 rollup/submitter.
    target: clickhouse-refined
    query: |
      SELECT
        COALESCE(name, 'Unknown') AS submitter,
        SUM(length(versioned_hashes)) AS total_blobs,
        SUM(length(versioned_hashes)) * 100.0 /
          (SELECT SUM(length(versioned_hashes)) FROM {network}.dim_block_blob_submitter FINAL WHERE updated_date_time >= now() - INTERVAL 1 DAY AND block_number > 0) AS market_share_pct
      FROM {network}.dim_block_blob_submitter FINAL
      WHERE updated_date_time >= now() - INTERVAL 1 DAY
        AND block_number > 0
      GROUP BY submitter
      ORDER BY total_blobs DESC
  - name: Daily blob statistics
    description: Daily summary of blob activity.
    target: clickhouse-refined
    query: |
      SELECT
        toDate(slot_start_date_time) AS day,
        COUNT() AS total_slots,
        SUM(blob_count) AS total_blobs,
        AVG(blob_count) AS avg_blobs_per_slot,
        countIf(blob_count > 0) AS slots_with_blobs,
        countIf(blob_count = 0) AS slots_without_blobs,
        MAX(blob_count) AS max_blobs_in_slot
      FROM {network}.fct_block_blob_count_head FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 7 DAY
      GROUP BY day
      ORDER BY day DESC
  - name: Blob submitter transaction details
    description: Get detailed transaction info for blob submissions.
    target: clickhouse-refined
    query: |
      SELECT
        updated_date_time,
        block_number,
        transaction_hash,
        transaction_index,
        name AS submitter_name,
        address AS submitter_address,
        length(versioned_hashes) AS blob_count,
        versioned_hashes
      FROM {network}.dim_block_blob_submitter FINAL
      WHERE updated_date_time >= now() - INTERVAL 1 HOUR
        AND block_number > 0
      ORDER BY updated_date_time DESC
      LIMIT 50
data_column_sidecars:
  name: Data Column Sidecars (PeerDAS)
  description: Queries for analyzing EIP-7594 PeerDAS data column availability and propagation
  examples:
  - name: Data column availability by slot
    description: Get data column availability percentage per slot and column index.
    target: clickhouse-refined
    query: |
      SELECT
        slot,
        column_index,
        availability_pct,
        probe_count,
        success_count,
        failure_count,
        p50_response_time_ms,
        p95_response_time_ms
      FROM {network}.fct_data_column_availability_by_slot FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      ORDER BY slot DESC, column_index
      LIMIT 100
  - name: Average column availability by index
    description: Average availability percentage for each column index over recent slots.
    target: clickhouse-refined
    query: |
      SELECT
        column_index,
        AVG(availability_pct) AS avg_availability_pct,
        MIN(availability_pct) AS min_availability_pct,
        COUNT() AS slot_count,
        SUM(probe_count) AS total_probes
      FROM {network}.fct_data_column_availability_by_slot FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY column_index
      ORDER BY column_index
  - name: Data column availability by epoch
    description: Epoch-level aggregated data column availability statistics.
    target: clickhouse-refined
    query: |
      SELECT
        epoch,
        column_index,
        avg_availability_pct,
        min_availability_pct,
        max_availability_pct,
        total_probe_count,
        total_success_count,
        avg_p50_response_time_ms,
        avg_p95_response_time_ms
      FROM {network}.fct_data_column_availability_by_epoch FINAL
      WHERE epoch_start_date_time >= now() - INTERVAL 6 HOUR
      ORDER BY epoch DESC, column_index
      LIMIT 100
  - name: Hourly data column availability trend
    description: Hourly trend of data column availability across all columns.
    target: clickhouse-refined
    query: |
      SELECT
        hour_start_date_time,
        column_index,
        avg_availability_pct,
        total_probe_count,
        total_success_count,
        total_failure_count,
        avg_p50_response_time_ms
      FROM {network}.fct_data_column_availability_hourly FINAL
      WHERE hour_start_date_time >= now() - INTERVAL 24 HOUR
      ORDER BY hour_start_date_time DESC, column_index
  - name: Columns with lowest availability
    description: Find data columns with the lowest availability in recent slots.
    target: clickhouse-refined
    query: |
      SELECT
        column_index,
        AVG(availability_pct) AS avg_availability_pct,
        MIN(availability_pct) AS min_availability_pct,
        countIf(availability_pct < 100) AS slots_below_100_pct,
        SUM(failure_count) AS total_failures
      FROM {network}.fct_data_column_availability_by_slot FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY column_index
      ORDER BY avg_availability_pct ASC
      LIMIT 20
  - name: Data column first seen timing
    description: When data columns were first seen across the network.
    target: clickhouse-refined
    query: |
      SELECT
        slot,
        column_index,
        MIN(seen_slot_start_diff) AS first_seen_ms,
        AVG(seen_slot_start_diff) AS avg_seen_ms,
        MAX(seen_slot_start_diff) AS max_seen_ms,
        COUNT() AS observation_count
      FROM {network}.fct_block_data_column_sidecar_first_seen FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY slot, column_index
      ORDER BY slot DESC, column_index
      LIMIT 100
  - name: Data column propagation by consensus client
    description: Compare data column propagation times across consensus clients.
    target: clickhouse-refined
    query: |
      SELECT
        meta_consensus_implementation AS client,
        AVG(seen_slot_start_diff) AS avg_propagation_ms,
        quantile(0.50)(seen_slot_start_diff) AS p50_propagation_ms,
        quantile(0.95)(seen_slot_start_diff) AS p95_propagation_ms,
        COUNT() AS observations
      FROM {network}.fct_block_data_column_sidecar_first_seen_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY client
      ORDER BY avg_propagation_ms
  - name: Data column propagation by country
    description: Compare data column propagation times across geographic regions.
    target: clickhouse-refined
    query: |
      SELECT
        meta_client_geo_country AS country,
        AVG(seen_slot_start_diff) AS avg_propagation_ms,
        quantile(0.50)(seen_slot_start_diff) AS p50_propagation_ms,
        quantile(0.95)(seen_slot_start_diff) AS p95_propagation_ms,
        COUNT() AS observations
      FROM {network}.fct_block_data_column_sidecar_first_seen_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY country
      ORDER BY observations DESC
      LIMIT 20
  - name: Slots with data column availability issues
    description: Find slots where any column had less than 100% availability.
    target: clickhouse-refined
    query: |
      SELECT
        slot,
        COUNT() AS columns_measured,
        countIf(availability_pct < 100) AS columns_with_issues,
        MIN(availability_pct) AS min_availability_pct,
        AVG(availability_pct) AS avg_availability_pct,
        SUM(failure_count) AS total_failures
      FROM {network}.fct_data_column_availability_by_slot FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY slot
      HAVING columns_with_issues > 0
      ORDER BY columns_with_issues DESC, slot DESC
  - name: Data column response time distribution
    description: Response time percentiles for data column probes by column index.
    target: clickhouse-refined
    query: |
      SELECT
        column_index,
        AVG(min_response_time_ms) AS avg_min_response_ms,
        AVG(p50_response_time_ms) AS avg_p50_response_ms,
        AVG(p95_response_time_ms) AS avg_p95_response_ms,
        AVG(p99_response_time_ms) AS avg_p99_response_ms,
        MAX(max_response_time_ms) AS max_response_ms
      FROM {network}.fct_data_column_availability_by_slot FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY column_index
      ORDER BY column_index
  - name: Node custody count per epoch
    description: Calculate how many columns each node is responsible for per epoch. Identifies supernodes
      (128 custody) vs regular nodes.
    target: clickhouse-refined
    query: |
      SELECT
        node_id,
        meta_consensus_implementation AS client,
        epoch,
        COUNT(DISTINCT column_index) AS custody_count,
        CASE
          WHEN COUNT(DISTINCT column_index) >= 128 THEN 'supernode'
          WHEN COUNT(DISTINCT column_index) >= 64 THEN 'high_custody'
          ELSE 'normal'
        END AS node_type
      FROM {network}.fct_block_data_column_sidecar_first_seen_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 DAY
      GROUP BY node_id, meta_consensus_implementation, epoch
      ORDER BY custody_count DESC
      LIMIT 100
  - name: Column spread per slot
    description: Measure time spread between first and last column received per slot per node. High spread
      indicates slow column acquisition.
    target: clickhouse-refined
    query: |
      SELECT
        slot,
        node_id,
        meta_consensus_implementation AS client,
        MIN(seen_slot_start_diff) AS first_column_ms,
        MAX(seen_slot_start_diff) AS last_column_ms,
        MAX(seen_slot_start_diff) - MIN(seen_slot_start_diff) AS spread_ms,
        COUNT(DISTINCT column_index) AS columns_received
      FROM {network}.fct_block_data_column_sidecar_first_seen_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY slot, node_id, meta_consensus_implementation
      HAVING columns_received > 1
      ORDER BY spread_ms DESC
      LIMIT 100
engine_api:
  name: Engine API (CL-EL Communication)
  description: >-
    Queries for analyzing consensus-execution layer communication timing and performance. The
    engine_newPayload aggregate tables are grouped by Engine API response status; use only VALID rows
    for execution-duration analysis because SYNCING, ACCEPTED, ERROR, INVALID, and INVALID_BLOCK_HASH
    are non-success outcomes.
  examples:
  - name: Engine newPayload duration by slot
    description: >-
      Get VALID newPayload execution times per slot. This table is grouped by status and node_class;
      filter status = 'VALID' before treating duration columns as execution time. Use
      int_engine_new_payload for individual node/client observations instead of slot aggregates.
    target: clickhouse-refined
    query: |
      SELECT
        slot,
        node_class,
        block_number,
        gas_used,
        tx_count,
        blob_count,
        observation_count,
        unique_node_count,
        avg_duration_ms,
        median_duration_ms,
        p95_duration_ms,
        max_duration_ms
      FROM {network}.fct_engine_new_payload_by_slot FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
        AND status = 'VALID'
      ORDER BY slot DESC, node_class
      LIMIT 100
  - name: Engine newPayload by execution client
    description: >-
      Compare VALID newPayload performance across execution layer clients. Filter status = 'VALID';
      rows with SYNCING or other non-success statuses did not successfully execute the payload.
    target: clickhouse-refined
    query: |
      SELECT
        meta_execution_implementation AS el_client,
        node_class,
        COUNT() AS slots,
        AVG(avg_duration_ms) AS avg_duration_ms,
        AVG(median_duration_ms) AS median_duration_ms,
        AVG(p95_duration_ms) AS p95_duration_ms,
        MAX(max_duration_ms) AS max_duration_ms
      FROM {network}.fct_engine_new_payload_by_el_client FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
        AND status = 'VALID'
      GROUP BY el_client, node_class
      ORDER BY avg_duration_ms
  - name: Engine newPayload hourly trend by client
    description: Hourly trend of VALID newPayload duration per execution client.
    target: clickhouse-refined
    query: |
      SELECT
        toStartOfHour(slot_start_date_time) AS hour,
        meta_execution_implementation AS el_client,
        node_class,
        COUNT() AS observations,
        AVG(avg_duration_ms) AS avg_duration_ms,
        AVG(p95_duration_ms) AS p95_duration_ms
      FROM {network}.fct_engine_new_payload_by_el_client FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 24 HOUR
        AND status = 'VALID'
      GROUP BY hour, el_client, node_class
      ORDER BY hour DESC, el_client, node_class
  - name: Slowest newPayload executions
    description: >-
      Find slots with the slowest VALID newPayload execution times. Exclude SYNCING and other
      non-success statuses so duration reflects successful execution, not a rejected or unavailable
      engine response.
    target: clickhouse-refined
    query: |
      SELECT
        slot,
        node_class,
        block_number,
        gas_used,
        tx_count,
        blob_count,
        max_duration_ms,
        p95_duration_ms,
        observation_count
      FROM {network}.fct_engine_new_payload_by_slot FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
        AND status = 'VALID'
      ORDER BY max_duration_ms DESC
      LIMIT 20
  - name: Engine getBlobs by slot
    description: Get getBlobs call statistics per slot.
    target: clickhouse-refined
    query: |
      SELECT
        slot,
        status,
        observation_count,
        max_requested_count,
        avg_returned_count,
        full_return_pct,
        avg_duration_ms,
        p95_duration_ms,
        max_duration_ms
      FROM {network}.fct_engine_get_blobs_by_slot FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      ORDER BY slot DESC
      LIMIT 100
  - name: Engine getBlobs by execution client
    description: Compare getBlobs performance across execution layer clients.
    target: clickhouse-refined
    query: |
      SELECT
        meta_execution_implementation AS el_client,
        COUNT() AS slots,
        AVG(avg_duration_ms) AS avg_duration_ms,
        AVG(median_duration_ms) AS median_duration_ms,
        AVG(p95_duration_ms) AS p95_duration_ms,
        MAX(max_duration_ms) AS max_duration_ms,
        AVG(avg_returned_count) AS avg_blobs_returned
      FROM {network}.fct_engine_get_blobs_by_el_client FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY el_client
      ORDER BY avg_duration_ms
  - name: Engine API duration percentile distribution
    description: Distribution of VALID newPayload durations in 50ms buckets.
    target: clickhouse-refined
    query: |
      SELECT
        duration_bucket_ms,
        SUM(valid_count) AS valid_observations,
        SUM(valid_count) * 100.0 / SUM(SUM(valid_count)) OVER () AS percentage
      FROM {network}.fct_engine_new_payload_duration_chunked_50ms FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
        AND valid_count > 0
      GROUP BY duration_bucket_ms
      ORDER BY duration_bucket_ms
  - name: Correlation between gas usage and newPayload duration
    description: Analyze how block gas usage affects VALID newPayload execution time.
    target: clickhouse-refined
    query: |
      SELECT
        intDiv(gas_used, 1000000) AS gas_millions,
        COUNT() AS slot_count,
        AVG(avg_duration_ms) AS avg_duration_ms,
        AVG(p95_duration_ms) AS p95_duration_ms,
        AVG(tx_count) AS avg_tx_count
      FROM {network}.fct_engine_new_payload_by_slot FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 6 HOUR
        AND status = 'VALID'
        AND gas_used > 0
      GROUP BY gas_millions
      ORDER BY gas_millions
  - name: Engine API performance by blob count
    description: Analyze how blob count affects VALID newPayload and getBlobs duration.
    target: clickhouse-refined
    query: |
      SELECT
        blob_count,
        COUNT() AS slot_count,
        AVG(avg_duration_ms) AS avg_newpayload_ms,
        AVG(p95_duration_ms) AS p95_newpayload_ms
      FROM {network}.fct_engine_new_payload_by_slot FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 6 HOUR
        AND status = 'VALID'
      GROUP BY blob_count
      ORDER BY blob_count
  - name: Engine getBlobs success rate distribution
    description: Breakdown of getBlobs call outcomes (SUCCESS, EMPTY, PARTIAL, ERROR). Use fct_engine_get_blobs_by_slot
      which has a status column with the call result. This table alone answers questions about getBlobs
      success/failure rates.
    target: clickhouse-refined
    query: |
      SELECT
        status,
        SUM(observation_count) AS total_calls,
        SUM(observation_count) * 100.0 / SUM(SUM(observation_count)) OVER () AS percentage,
        AVG(avg_duration_ms) AS avg_duration_ms
      FROM {network}.fct_engine_get_blobs_by_slot FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 24 HOUR
      GROUP BY status
      ORDER BY total_calls DESC
execution_state:
  name: Execution State Growth
  description: Queries for analyzing Ethereum state size and storage slot usage
  examples:
  - name: Daily state size growth
    description: Track daily growth of Ethereum state size.
    target: clickhouse-refined
    query: |
      SELECT
        day_start_date,
        formatReadableSize(total_bytes) AS total_size,
        accounts,
        storages,
        formatReadableSize(account_bytes) AS account_size,
        formatReadableSize(storage_bytes) AS storage_size,
        formatReadableSize(contract_code_bytes) AS code_size
      FROM {network}.fct_execution_state_size_daily FINAL
      WHERE day_start_date >= today() - 90
      ORDER BY day_start_date DESC
      LIMIT 30
  - name: Hourly state size growth
    description: Track hourly growth of Ethereum state size.
    target: clickhouse-refined
    query: |
      SELECT
        hour_start_date_time,
        formatReadableSize(total_bytes) AS total_size,
        accounts,
        storages,
        formatReadableSize(storage_bytes) AS storage_size
      FROM {network}.fct_execution_state_size_hourly FINAL
      WHERE hour_start_date_time >= now() - INTERVAL 7 DAY
      ORDER BY hour_start_date_time DESC
      LIMIT 48
  - name: State growth rate
    description: Calculate daily state growth rate over the past week.
    target: clickhouse-refined
    query: |
      SELECT
        day_start_date,
        total_bytes,
        total_bytes - lagInFrame(total_bytes) OVER (ORDER BY day_start_date) AS bytes_growth,
        accounts - lagInFrame(accounts) OVER (ORDER BY day_start_date) AS accounts_growth,
        storages - lagInFrame(storages) OVER (ORDER BY day_start_date) AS storages_growth
      FROM {network}.fct_execution_state_size_daily FINAL
      WHERE day_start_date >= today() - 90
      ORDER BY day_start_date DESC
      LIMIT 8
  - name: State composition breakdown
    description: Breakdown of state size by component type.
    target: clickhouse-refined
    query: |
      SELECT
        day_start_date,
        formatReadableSize(account_bytes) AS accounts,
        formatReadableSize(account_trienode_bytes) AS account_tries,
        formatReadableSize(contract_code_bytes) AS contract_code,
        formatReadableSize(storage_bytes) AS storage,
        formatReadableSize(storage_trienode_bytes) AS storage_tries,
        formatReadableSize(total_bytes) AS total
      FROM {network}.fct_execution_state_size_daily FINAL
      WHERE day_start_date >= today() - 90
      ORDER BY day_start_date DESC
      LIMIT 1
execution_traces:
  name: Execution Trace Analysis (Call Frames, Gas Breakdown)
  description: Queries for analyzing EVM execution traces using int_transaction_call_frame on clickhouse-refined.
    This table contains one row per call frame per transaction — use it for gas breakdown by contract,
    precompile usage, call depth analysis, and function-level profiling. Partitioned by block_number —
    always filter on block_number. For opcode-level gas breakdown within a frame, use int_transaction_call_frame_opcode_gas
    instead.
  examples:
  - name: Precompile gas usage for a block
    description: Rank EVM precompiles by gas consumed in a specific block. Precompile contracts live at
      addresses 0x01–0x0a. Uses int_transaction_call_frame which has per-frame gas accounting.
    target: clickhouse-refined
    query: |
      SELECT
        target_address,
        count() AS call_count,
        sum(gas) AS total_self_gas,
        avg(gas) AS avg_gas_per_call,
        sum(gas_cumulative) AS total_cumulative_gas
      FROM {network}.int_transaction_call_frame
      WHERE block_number = 22068000
        AND target_address IN (
          '0x0000000000000000000000000000000000000001',
          '0x0000000000000000000000000000000000000002',
          '0x0000000000000000000000000000000000000003',
          '0x0000000000000000000000000000000000000004',
          '0x0000000000000000000000000000000000000005',
          '0x0000000000000000000000000000000000000006',
          '0x0000000000000000000000000000000000000007',
          '0x0000000000000000000000000000000000000008',
          '0x0000000000000000000000000000000000000009',
          '0x000000000000000000000000000000000000000a'
        )
      GROUP BY target_address
      ORDER BY total_self_gas DESC
  - name: Top gas-consuming contracts in a block
    description: Find the contracts consuming the most gas in a specific block. Uses self gas (excludes
      child frames) for accurate per-contract attribution.
    target: clickhouse-refined
    query: |
      SELECT
        target_address,
        count() AS call_count,
        sum(gas) AS total_self_gas,
        avg(gas) AS avg_gas_per_call
      FROM {network}.int_transaction_call_frame
      WHERE block_number = 22068000
        AND target_address IS NOT NULL
      GROUP BY target_address
      ORDER BY total_self_gas DESC
      LIMIT 20
  - name: Call type distribution for a block range
    description: Breakdown of call types (CALL, DELEGATECALL, STATICCALL, CREATE, etc.) and their gas
      usage across a block range.
    target: clickhouse-refined
    query: |
      SELECT
        call_type,
        count() AS frame_count,
        sum(gas) AS total_gas,
        avg(depth) AS avg_depth
      FROM {network}.int_transaction_call_frame
      WHERE block_number BETWEEN 22068000 AND 22068100
      GROUP BY call_type
      ORDER BY total_gas DESC
prepared_blocks:
  name: Prepared Blocks (Local Block Building)
  description: Queries for analyzing locally prepared block performance and characteristics
  examples:
  - name: Recent prepared blocks
    description: Get details of recently prepared blocks by local nodes.
    target: clickhouse-refined
    query: |
      SELECT
        slot,
        slot_start_date_time,
        meta_consensus_implementation AS cl_client,
        block_version,
        execution_payload_block_number AS block_number,
        execution_payload_gas_used AS gas_used,
        execution_payload_transactions_count AS tx_count,
        block_total_bytes,
        execution_payload_value / 1e18 AS block_value_eth
      FROM {network}.fct_prepared_block FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      ORDER BY slot DESC
      LIMIT 50
  - name: Prepared blocks by consensus client
    description: Compare block building across consensus clients.
    target: clickhouse-refined
    query: |
      SELECT
        meta_consensus_implementation AS cl_client,
        COUNT() AS blocks_prepared,
        AVG(execution_payload_gas_used) AS avg_gas_used,
        AVG(execution_payload_transactions_count) AS avg_tx_count,
        AVG(block_total_bytes) AS avg_block_bytes,
        AVG(execution_payload_value) / 1e18 AS avg_value_eth
      FROM {network}.fct_prepared_block FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 6 HOUR
      GROUP BY cl_client
      ORDER BY blocks_prepared DESC
  - name: Prepared blocks by country
    description: Geographic distribution of block preparation.
    target: clickhouse-refined
    query: |
      SELECT
        meta_client_geo_country AS country,
        COUNT() AS blocks_prepared,
        AVG(execution_payload_gas_used) AS avg_gas_used,
        AVG(execution_payload_transactions_count) AS avg_tx_count
      FROM {network}.fct_prepared_block FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 6 HOUR
      GROUP BY country
      ORDER BY blocks_prepared DESC
      LIMIT 20
  - name: Block size distribution
    description: Distribution of prepared block sizes.
    target: clickhouse-refined
    query: |
      SELECT
        intDiv(block_total_bytes, 10000) * 10 AS size_kb_bucket,
        COUNT() AS block_count,
        AVG(execution_payload_transactions_count) AS avg_tx_count,
        AVG(execution_payload_gas_used) AS avg_gas_used
      FROM {network}.fct_prepared_block FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 6 HOUR
        AND block_total_bytes IS NOT NULL
      GROUP BY size_kb_bucket
      ORDER BY size_kb_bucket
  - name: High value prepared blocks
    description: Find prepared blocks with highest execution payload values.
    target: clickhouse-refined
    query: |
      SELECT
        slot,
        meta_consensus_implementation AS cl_client,
        execution_payload_block_number AS block_number,
        execution_payload_value / 1e18 AS value_eth,
        execution_payload_gas_used AS gas_used,
        execution_payload_transactions_count AS tx_count
      FROM {network}.fct_prepared_block FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 6 HOUR
        AND execution_payload_value > 0
      ORDER BY execution_payload_value DESC
      LIMIT 20
  - name: Block version distribution
    description: Distribution of block versions (deneb, electra, etc).
    target: clickhouse-refined
    query: |
      SELECT
        block_version,
        COUNT() AS block_count,
        AVG(block_total_bytes) AS avg_block_bytes,
        AVG(execution_payload_transactions_count) AS avg_tx_count
      FROM {network}.fct_prepared_block FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 24 HOUR
      GROUP BY block_version
      ORDER BY block_count DESC
node_metadata:
  name: Node Metadata & Diversity
  description: Queries for analyzing sentry node distribution and client diversity
  examples:
  - name: Active nodes summary
    description: Get summary of active sentry nodes in the last 24 hours.
    target: clickhouse-refined
    query: |
      SELECT
        COUNT() AS total_nodes,
        countDistinct(meta_consensus_implementation) AS unique_cl_clients,
        countDistinct(meta_client_geo_country) AS unique_countries,
        countDistinct(meta_client_geo_autonomous_system_organization) AS unique_asns
      FROM {network}.fct_node_active_last_24h FINAL
      WHERE meta_client_name != ''
  - name: Nodes by consensus client
    description: Distribution of active nodes by consensus client.
    target: clickhouse-refined
    query: |
      SELECT
        meta_consensus_implementation AS cl_client,
        COUNT() AS node_count,
        COUNT() * 100.0 / SUM(COUNT()) OVER () AS percentage
      FROM {network}.fct_node_active_last_24h FINAL
      WHERE meta_client_name != ''
      GROUP BY cl_client
      ORDER BY node_count DESC
  - name: Nodes by country
    description: Geographic distribution of active sentry nodes.
    target: clickhouse-refined
    query: |
      SELECT
        meta_client_geo_country AS country,
        meta_client_geo_country_code AS country_code,
        COUNT() AS node_count,
        COUNT() * 100.0 / SUM(COUNT()) OVER () AS percentage
      FROM {network}.fct_node_active_last_24h FINAL
      WHERE meta_client_name != ''
      GROUP BY country, country_code
      ORDER BY node_count DESC
      LIMIT 20
  - name: Nodes by ASN
    description: Distribution of nodes by autonomous system (hosting provider).
    target: clickhouse-refined
    query: |
      SELECT
        meta_client_geo_autonomous_system_organization AS asn_org,
        meta_client_geo_autonomous_system_number AS asn,
        COUNT() AS node_count
      FROM {network}.fct_node_active_last_24h FINAL
      WHERE meta_client_geo_autonomous_system_organization IS NOT NULL
        AND meta_client_name != ''
      GROUP BY asn_org, asn
      ORDER BY node_count DESC
      LIMIT 20
  - name: Client version distribution
    description: Distribution of consensus client versions.
    target: clickhouse-refined
    query: |
      SELECT
        meta_consensus_implementation AS cl_client,
        meta_consensus_version AS version,
        COUNT() AS node_count
      FROM {network}.fct_node_active_last_24h FINAL
      WHERE meta_client_name != ''
      GROUP BY cl_client, version
      ORDER BY cl_client, node_count DESC
  - name: Node classification breakdown
    description: Breakdown of nodes by classification type.
    target: clickhouse-refined
    query: |
      SELECT
        classification,
        COUNT() AS node_count,
        countDistinct(meta_consensus_implementation) AS unique_clients,
        countDistinct(meta_client_geo_country) AS unique_countries
      FROM {network}.fct_node_active_last_24h FINAL
      WHERE meta_client_name != ''
      GROUP BY classification
      ORDER BY node_count DESC
  - name: Nodes by continent
    description: Distribution of nodes by continent.
    target: clickhouse-refined
    query: |
      SELECT
        meta_client_geo_continent_code AS continent,
        COUNT() AS node_count,
        countDistinct(meta_client_geo_country) AS countries,
        countDistinct(meta_consensus_implementation) AS cl_clients
      FROM {network}.fct_node_active_last_24h FINAL
      WHERE meta_client_name != ''
      GROUP BY continent
      ORDER BY node_count DESC
mev_bids:
  name: MEV Bid Analysis
  description: Queries for analyzing MEV bid patterns by builder and relay
  examples:
  - name: Bids per slot by builder
    description: Total bids submitted per slot by each builder.
    target: clickhouse-refined
    query: |
      SELECT
        slot,
        builder_pubkey,
        bid_total
      FROM {network}.fct_mev_bid_count_by_builder FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      ORDER BY slot DESC, bid_total DESC
      LIMIT 100
  - name: Top builders by total bids
    description: Builders ranked by total bid count.
    target: clickhouse-refined
    query: |
      SELECT
        builder_pubkey,
        SUM(bid_total) AS total_bids,
        COUNT() AS slots_with_bids,
        AVG(bid_total) AS avg_bids_per_slot
      FROM {network}.fct_mev_bid_count_by_builder FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY builder_pubkey
      ORDER BY total_bids DESC
      LIMIT 20
  - name: Bids per slot by relay
    description: Total bids received per slot by each relay.
    target: clickhouse-refined
    query: |
      SELECT
        slot,
        relay_name,
        bid_total
      FROM {network}.fct_mev_bid_count_by_relay FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      ORDER BY slot DESC, bid_total DESC
      LIMIT 100
  - name: Relay bid volume comparison
    description: Compare bid volumes across relays.
    target: clickhouse-refined
    query: |
      SELECT
        relay_name,
        SUM(bid_total) AS total_bids,
        COUNT() AS slots_with_bids,
        AVG(bid_total) AS avg_bids_per_slot,
        MAX(bid_total) AS max_bids_in_slot
      FROM {network}.fct_mev_bid_count_by_relay FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY relay_name
      ORDER BY total_bids DESC
  - name: Highest value bids by timing
    description: Track when highest value bids arrive relative to slot start.
    target: clickhouse-refined
    query: |
      SELECT
        slot,
        chunk_slot_start_diff AS timing_ms,
        builder_pubkey,
        value / 1e18 AS value_eth,
        relay_names,
        block_hash
      FROM {network}.fct_mev_bid_highest_value_by_builder_chunked_50ms FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      ORDER BY slot DESC, value DESC
      LIMIT 100
  - name: Bid value progression within slot
    description: How bid values increase as slot deadline approaches.
    target: clickhouse-refined
    query: |
      SELECT
        chunk_slot_start_diff AS timing_ms,
        COUNT() AS bid_count,
        AVG(value) / 1e18 AS avg_value_eth,
        MAX(value) / 1e18 AS max_value_eth
      FROM {network}.fct_mev_bid_highest_value_by_builder_chunked_50ms FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY timing_ms
      ORDER BY timing_ms
  - name: Builder bid timing patterns
    description: When different builders typically submit their highest bids.
    target: clickhouse-refined
    query: |
      SELECT
        builder_pubkey,
        AVG(chunk_slot_start_diff) AS avg_timing_ms,
        MIN(chunk_slot_start_diff) AS earliest_timing_ms,
        MAX(chunk_slot_start_diff) AS latest_timing_ms,
        COUNT() AS bid_count,
        AVG(value) / 1e18 AS avg_value_eth
      FROM {network}.fct_mev_bid_highest_value_by_builder_chunked_50ms FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY builder_pubkey
      ORDER BY avg_value_eth DESC
      LIMIT 20
attestation_propagation:
  name: Attestation Propagation
  description: Queries for analyzing attestation arrival timing and distribution
  examples:
  - name: Attestation arrival distribution
    description: Distribution of attestation arrival times in 50ms buckets.
    target: clickhouse-refined
    query: |
      SELECT
        chunk_slot_start_diff AS timing_ms,
        SUM(attestation_count) AS total_attestations,
        SUM(attestation_count) * 100.0 / SUM(SUM(attestation_count)) OVER () AS percentage
      FROM {network}.fct_attestation_first_seen_chunked_50ms FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY timing_ms
      ORDER BY timing_ms
  - name: Attestation arrival by slot
    description: Attestation timing statistics per slot.
    target: clickhouse-refined
    query: |
      SELECT
        slot,
        SUM(attestation_count) AS total_attestations,
        MIN(chunk_slot_start_diff) AS earliest_ms,
        MAX(chunk_slot_start_diff) AS latest_ms
      FROM {network}.fct_attestation_first_seen_chunked_50ms FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY slot
      ORDER BY slot DESC
      LIMIT 50
  - name: Attestation observations by node
    description: How each node observes attestations.
    target: clickhouse-refined
    query: |
      SELECT
        meta_consensus_implementation AS cl_client,
        meta_client_geo_country AS country,
        SUM(attestation_count) AS total_attestations,
        AVG(avg_seen_slot_start_diff) AS avg_arrival_ms,
        AVG(min_seen_slot_start_diff) AS avg_earliest_ms
      FROM {network}.fct_attestation_observation_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY cl_client, country
      ORDER BY total_attestations DESC
      LIMIT 30
  - name: Attestation propagation by consensus client
    description: Compare attestation arrival times across consensus clients.
    target: clickhouse-refined
    query: |
      SELECT
        meta_consensus_implementation AS cl_client,
        COUNT() AS observation_count,
        AVG(avg_seen_slot_start_diff) AS avg_arrival_ms,
        AVG(median_seen_slot_start_diff) AS median_arrival_ms,
        AVG(min_seen_slot_start_diff) AS avg_earliest_ms
      FROM {network}.fct_attestation_observation_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY cl_client
      ORDER BY avg_arrival_ms
  - name: Attestation propagation by country
    description: Compare attestation arrival times across countries.
    target: clickhouse-refined
    query: |
      SELECT
        meta_client_geo_country AS country,
        COUNT() AS observation_count,
        AVG(avg_seen_slot_start_diff) AS avg_arrival_ms,
        AVG(min_seen_slot_start_diff) AS avg_earliest_ms,
        SUM(attestation_count) AS total_attestations
      FROM {network}.fct_attestation_observation_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY country
      ORDER BY total_attestations DESC
      LIMIT 20
  - name: Late attestation analysis
    description: Find slots with late-arriving attestations.
    target: clickhouse-refined
    query: |
      SELECT
        slot,
        SUM(attestation_count) AS late_attestations,
        MIN(chunk_slot_start_diff) AS earliest_late_ms
      FROM {network}.fct_attestation_first_seen_chunked_50ms FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
        AND chunk_slot_start_diff >= 4000
      GROUP BY slot
      ORDER BY late_attestations DESC
      LIMIT 20
head_tracking:
  name: Head Tracking (Fork Choice)
  description: Queries for analyzing when nodes adopt new chain heads
  examples:
  - name: Head adoption timing by slot
    description: When nodes adopt new heads relative to slot start.
    target: clickhouse-refined
    query: |
      SELECT
        slot,
        MIN(seen_slot_start_diff) AS earliest_adoption_ms,
        AVG(seen_slot_start_diff) AS avg_adoption_ms,
        MAX(seen_slot_start_diff) AS latest_adoption_ms,
        COUNT() AS node_count
      FROM {network}.fct_head_first_seen_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY slot
      ORDER BY slot DESC
      LIMIT 50
  - name: Head adoption by consensus client
    description: Compare head adoption timing across consensus clients.
    target: clickhouse-refined
    query: |
      SELECT
        meta_consensus_implementation AS cl_client,
        AVG(seen_slot_start_diff) AS avg_adoption_ms,
        quantile(0.50)(seen_slot_start_diff) AS p50_adoption_ms,
        quantile(0.95)(seen_slot_start_diff) AS p95_adoption_ms,
        COUNT() AS observations
      FROM {network}.fct_head_first_seen_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY cl_client
      ORDER BY avg_adoption_ms
  - name: Head adoption by country
    description: Compare head adoption timing across countries.
    target: clickhouse-refined
    query: |
      SELECT
        meta_client_geo_country AS country,
        AVG(seen_slot_start_diff) AS avg_adoption_ms,
        quantile(0.50)(seen_slot_start_diff) AS p50_adoption_ms,
        quantile(0.95)(seen_slot_start_diff) AS p95_adoption_ms,
        COUNT() AS observations
      FROM {network}.fct_head_first_seen_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY country
      ORDER BY observations DESC
      LIMIT 20
  - name: Slow head adoption events
    description: Find slots where head adoption was unusually slow.
    target: clickhouse-refined
    query: |
      SELECT
        slot,
        block_root,
        AVG(seen_slot_start_diff) AS avg_adoption_ms,
        MAX(seen_slot_start_diff) AS max_adoption_ms,
        COUNT() AS nodes_observed
      FROM {network}.fct_head_first_seen_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY slot, block_root
      HAVING avg_adoption_ms > 2000
      ORDER BY avg_adoption_ms DESC
      LIMIT 20
  - name: Head adoption by source
    description: Compare head adoption timing by event source.
    target: clickhouse-refined
    query: |
      SELECT
        source,
        AVG(seen_slot_start_diff) AS avg_adoption_ms,
        quantile(0.50)(seen_slot_start_diff) AS p50_adoption_ms,
        COUNT() AS observations
      FROM {network}.fct_head_first_seen_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY source
      ORDER BY observations DESC
  - name: Head adoption variance by slot
    description: Measure how much head adoption timing varies across nodes per slot.
    target: clickhouse-refined
    query: |
      SELECT
        slot,
        AVG(seen_slot_start_diff) AS avg_adoption_ms,
        stddevPop(seen_slot_start_diff) AS stddev_adoption_ms,
        MAX(seen_slot_start_diff) - MIN(seen_slot_start_diff) AS adoption_spread_ms,
        COUNT() AS nodes_observed
      FROM {network}.fct_head_first_seen_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
      GROUP BY slot
      ORDER BY adoption_spread_ms DESC
      LIMIT 20
  - name: Head adoption by ASN
    description: Compare head adoption timing across hosting providers.
    target: clickhouse-refined
    query: |
      SELECT
        meta_client_geo_autonomous_system_organization AS asn_org,
        AVG(seen_slot_start_diff) AS avg_adoption_ms,
        quantile(0.95)(seen_slot_start_diff) AS p95_adoption_ms,
        COUNT() AS observations
      FROM {network}.fct_head_first_seen_by_node FINAL
      WHERE slot_start_date_time >= now() - INTERVAL 1 HOUR
        AND meta_client_geo_autonomous_system_organization IS NOT NULL
      GROUP BY asn_org
      ORDER BY observations DESC
      LIMIT 20
