# Query examples for the otel-logs dataset.
# Each example's `target` is the ClickHouse datasource (cluster) it runs against.

devnet_logs:
  name: Local Devnet OTel Logs
  description: Queries for local Kurtosis devnet OTel logs exposed through the autodiscovered local-kurtosis
    ClickHouse datasource. Replace {db} with the database hosting the otel-logs dataset — given by the
    datasource's dataset params or its default database (see datasources://).
  examples:
  - name: List local devnet enclaves
    description: List Kurtosis enclave names currently present in the shared local OTel logs table. Run
      this before filtering logs because multiple devnets can share one table.
    target: local-kurtosis
    query: |
      SELECT DISTINCT EnclaveName
      FROM {db}.otel_logs
      WHERE EnclaveName != ''
      ORDER BY EnclaveName
  - name: Recent service errors
    description: Fetch recent error-class logs for a specific service in a specific local Kurtosis enclave
      by matching the raw log body.
    target: local-kurtosis
    query: |
      SELECT
        Timestamp,
        ServiceName,
        Body
      FROM {db}.otel_logs
      WHERE EnclaveName = {enclave:String}
        AND ServiceName = {service:String}
        AND match(Body, '(?i)(crit|err|error|fatal)')
        AND Timestamp >= now() - INTERVAL 1 HOUR
      ORDER BY Timestamp DESC
      LIMIT 200
  - name: EL warnings and errors
    description: Fetch recent EL warning/error logs for a local Kurtosis enclave by matching the raw log
      body.
    target: local-kurtosis
    query: |
      SELECT
        Timestamp,
        ServiceName,
        Body
      FROM {db}.otel_logs
      WHERE EnclaveName = {enclave:String}
        AND ServiceName LIKE 'el-%'
        AND match(Body, '(?i)(crit|err|error|fatal|warn)')
        AND Timestamp >= now() - INTERVAL 1 HOUR
      ORDER BY Timestamp DESC
      LIMIT 200
production_devnet_logs:
  name: Production Devnet OTel Logs
  description: Queries for hosted (multi-VM) devnet and testnet container logs in the clickhouse-raw datasource,
    table {db}.otel_logs — replace {db} with the database from the datasource's otel-logs dataset params
    (see datasources://). Logs are keyed by ResourceAttributes['network'] (devnet name) and ResourceAttributes['host.name']
    (node, e.g. lighthouse-geth-super-1). SeverityText is usually empty for raw Docker logs, so match
    severity on Body. This is NOT for local Kurtosis devnets — use the local-kurtosis datasource for those.
  examples:
  - name: List devnet nodes shipping logs
    description: List the nodes (host.name) currently shipping container logs for a hosted devnet. Run
      this to discover the node topology before drilling into a specific node.
    target: clickhouse-raw
    query: |
      SELECT DISTINCT ResourceAttributes['host.name'] AS host
      FROM {db}.otel_logs
      WHERE ResourceAttributes['network'] = {network:String}
        AND Timestamp >= now() - INTERVAL 1 HOUR
      ORDER BY host
  - name: Recent node errors
    description: Fetch recent error-class logs for one devnet node by matching the raw log body. A node
      VM mixes its CL, EL, validator and sidecar containers — use LogAttributes['log.file.name'] to tell
      them apart.
    target: clickhouse-raw
    query: |
      SELECT
        Timestamp,
        ResourceAttributes['host.name'] AS host,
        LogAttributes['log.file.name'] AS container_log,
        Body
      FROM {db}.otel_logs
      WHERE ResourceAttributes['network'] = {network:String}
        AND ResourceAttributes['host.name'] = {host:String}
        AND match(Body, '(?i)(crit|err|error|fatal)')
        AND Timestamp >= now() - INTERVAL 1 HOUR
      ORDER BY Timestamp DESC
      LIMIT 200
  - name: Errors across a consensus client type
    description: Sweep error-class logs across all nodes running a given CL client. host.name is <cl>-<el>-<tier>-<n>,
      so a 'lighthouse-%' prefix matches lighthouse-CL nodes. Results still mix each node's EL/sidecar
      lines.
    target: clickhouse-raw
    query: |
      SELECT
        Timestamp,
        ResourceAttributes['host.name'] AS host,
        Body
      FROM {db}.otel_logs
      WHERE ResourceAttributes['network'] = {network:String}
        AND ResourceAttributes['host.name'] LIKE {cl_prefix:String}
        AND match(Body, '(?i)(crit|err|error|fatal)')
        AND Timestamp >= now() - INTERVAL 1 HOUR
      ORDER BY Timestamp DESC
      LIMIT 500
