<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>panda case studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐼</text></svg>">
</head>
<body>
<header class="topbar">
  <div class="wordmark">
    <span class="mark-emoji">🐼</span>
    <span class="mark-text">case<em>studio</em></span>
    <span class="mark-sub">eval case forge · local panda</span>
  </div>
  <div class="topstats" id="topstats"></div>
</header>

<main class="layout">
  <aside class="rail">
    <section class="composer panel" id="composer">
      <div class="panel-title">⌁ new question</div>
      <textarea id="q-input" rows="3" placeholder="What's the p50 block arrival of the most recent mainnet block?"></textarea>
      <textarea id="q-expect" rows="2" class="expect-input" placeholder="rough expectation (optional) — auto-triages each run, e.g. “should query mainnet.fct_block; answer ≈290”"></textarea>
      <div class="composer-row">
        <label class="field">
          <span>runs</span>
          <input id="q-runs" type="number" min="1" max="10" value="5">
        </label>
        <label class="field">
          <span>route</span>
          <select id="q-route">
            <option value="cli" selected>cli</option>
            <option value="mcp">mcp</option>
          </select>
        </label>
      </div>
      <div class="models" id="q-models"></div>
      <div class="model-dd" id="model-dd" hidden>
        <input id="model-search" placeholder="search 500+ models…" autocomplete="off">
        <div class="model-dd-list" id="model-dd-list"></div>
      </div>
      <button class="launch" id="q-submit">launch agents ▸</button>
      <div class="composer-msg" id="q-msg"></div>
    </section>

    <nav class="tabs" id="tabs">
      <button data-tab="all" class="active">all</button>
      <button data-tab="running">running</button>
      <button data-tab="needs_review">review</button>
      <button data-tab="done">done</button>
      <button data-tab="archived">archived</button>
    </nav>
    <div class="queue" id="queue"></div>
  </aside>

  <section class="detail" id="detail">
    <div class="empty-state">
      <div class="empty-mark">🐼</div>
      <p>submit a question, then pick it from the queue.<br>five agents will chew on it via the local panda.</p>
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>
<script src="/static/app.js"></script>
</body>
</html>
