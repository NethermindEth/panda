[pytest]
asyncio_mode = auto
testpaths = tests
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning
    # record_property (used for the clean per-question summary line) only warns that
    # it won't be embedded in xunit2 XML; we read it off the report, not the XML.
    ignore:.*record_property is incompatible with junit_family.*:pytest.PytestWarning
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    visualization: marks visualization tests
    multi_step: marks multi-step session tests
