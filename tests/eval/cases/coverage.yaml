  - id: dec4_relay_circuit_breaker                        # 💬 fixed-date incident
    description: the 2025-12-04 MEV relay circuit-breaker collapse (finalized 
      history)
    input: "Around the 3rd-4th of December 2025, MEV relay circuit breakers reportedly
      tripped on mainnet and relay-delivered blocks collapsed for a while. Find the
      actual window and quantify how bad it got."
    tags: [clickhouse, mev, relay, incident]
    assert:
      - type: llm-rubric
        value: >
          Places the incident on 2025-12-04 UTC (early morning, starting roughly
          02:50-03:30) from real queries over relay payload-delivered data, and
          quantifies the collapse with concrete numbers at any granularity:
          relay-delivered slots fall from a ~85-95%-of-slots baseline to roughly
          a quarter or less at the trough (epoch views show epochs at or near zero
          delivered in the 411,440-411,460 range; hourly views show ~77 of 300
          slots in the worst hour), recovering later the same day. The data puts
          it on Dec 4 even though the prompt hedges "3rd-4th" — pinning it to Dec
          3 without checking fails, as does a window with no collapse numbers.
    variations:
