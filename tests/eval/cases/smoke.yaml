# Smoke test cases for ethpandaops-panda CI.
#
# A couple of fast, simple questions that verify the whole pipeline works end to end:
# the agent reaches the data, runs a query, and returns a plausible answer. Runs as
# the external-scoped panda-ci identity against the hosted production proxy.
#
# Grading is promptfoo `assert:` blocks (llm-rubric). The rubric describes what a
# correct answer looks like — a wrong number fails instead of passing on plausibility.

  - id: mainnet_block_arrival_p50
    description: p50 block arrival of the most recent mainnet block
    input: "What's the p50 block arrival of the most recent mainnet block?"
    network: mainnet
    tags: [smoke, clickhouse, blocks, timing]
    assert:
      - type: llm-rubric
        value: >
          Reports a p50 (median) block arrival time for recent mainnet blocks,
          derived from a real ClickHouse query against block-timing data. An answer
          with no
          number, a hallucinated figure, or one wildly outside that range fails.

    variations:
      - What is the p50 block arrival for the most recent mainnet block?
      - Give me the p50 block arrival of the latest mainnet block.
      - I'm trying to find the p50 block arrival for the most recent mainnet 
        block.
      - For the most recent mainnet block, what is the p50 block arrival?
      - Please report the p50 block arrival metric for the most recent mainnet 
        block.
  - id: list_datasources
    description: Discover available datasources
    input: "What datasources are available for me to query? List them."
    tags: [smoke]
    assert:
      - type: llm-rubric
        value: >
          Lists the datasources the harness actually exposes (discovered live, not
          guessed). A vague non-answer or an invented list fails.

    variations:
      - Which datasources can I query? Please list them.
      - List the datasources that are available for me to query.
      - I'm trying to see what datasources I can query. Can you list them?
      - What are all of the available datasources I’m able to query?
      - Please provide a list of the datasources available for me to query.
  - id: block_count_24h
    description: Block production count for the last 24 hours
    input: "How many blocks were produced on mainnet in the last 24 hours?"
    network: mainnet
    tags: [smoke, clickhouse, blocks]
    assert:
      - type: llm-rubric
        value: >
          Reports a count of mainnet blocks produced in the last 24 hours, from a
          real
          query. A missing or hallucinated figure fails - the data must be sourced
          from  a datasource.


    variations:
      - How many mainnet blocks were produced in the last 24 hours?
      - Count the number of blocks produced on mainnet over the last 24 hours.
      - In the past 24 hours, how many blocks has mainnet produced?
      - I'm trying to find the total number of blocks produced on mainnet in the
        last 24 hours.
      - What is the block production count on mainnet for the last 24 hours?
  - id: missed_slots_24h
    description: Missed slots in the last 24 hours
    input: "How many slots were missed in the last 24 hours on mainnet?"
    network: mainnet
    tags: [smoke, clickhouse, blocks]
    assert:
      - type: llm-rubric
        value: >
          Reports a count of missed (skipped) mainnet slots over the last 24 hours,
          from a real query. This is normally a small fraction of slots (order of
          tens),
          so a low count passes; a missing answer or an implausibly huge number fails.
    variations:
      - 'Missed slots on mainnet in the last 24 hours: how many?'
      - What is the count of missed slots on mainnet over the last 24 hours?
      - I'm trying to find out how many slots have been missed on mainnet during
        the last 24 hours.
      - Please report the number of slots missed on mainnet in the last 24 
        hours.
      - For mainnet, how many slots were missed over the past 24 hours?
