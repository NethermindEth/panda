# Network status & discovery: devnet/testnet liveness, peers, logs.
#
# Grading is promptfoo `assert:` blocks (llm-rubric): the rubric describes what a correct
# answer looks like, NOT how to get it. Selection is by tags (`--tags`); this file is just
# the networks drawer. Provenance marks on each case are real, not invented:
#   ✓ = verbatim from a passing trace   💬 = real chat-history ask   📓 = a real notebooks investigation

  - id: devnets_running                                  # ✓
    description: which devnets are currently active (network discovery)
    input: "What devnets are currently running?"
    tags: [networks]
    assert:
      - type: llm-rubric
        value: >
          Names the devnets currently active, discovered live from the network-discovery
          data (not guessed or remembered). A concrete list of one or more current
          devnet
          names passes; a vague non-answer or an admission it couldn't find out fails.

    variations:
      - Which devnets are running right now?
      - List the devnets that are currently running.
      - What development networks are active at the moment?
      - I'm trying to see which devnets are presently running.
      - Can you tell me which devnets are currently up and running?





  - id: testnet_status                                    # 💬 "state of hoodi" ask
    description: live health summary of the hoodi testnet
    input: "What's the current state of the hoodi testnet? Is it finalizing, and how
      does recent block production look?"
    network: hoodi
    tags: [networks]
    assert:
      - type: llm-rubric
        value: >
          Reports hoodi's live state from a real explorer/node query: the current
          epoch and finalized epoch (normally ~2 epochs behind head when healthy),
          plus a recent block-production or participation figure. Concrete, mutually
          consistent numbers pass; tiny stale epoch numbers, or a verdict with no
          numbers, fail.
    variations:
      - How is the hoodi testnet doing right now? Is it finalizing, and what 
        does recent block production look like?
      - Give me the current status of the hoodi testnet, including whether it is
        finalizing and how block production has looked recently.
      - "I'm trying to understand the present state of the hoodi testnet: is it finalizing,
        and what has recent block production been like?"
      - What is the current condition of the hoodi testnet? Please assess 
        whether it is finalizing and summarize recent block production.
      - "Check the hoodi testnet's current state: finalization status and recent block
        production behavior."


  - id: devnet_error_logs                                 # 💬 devnet log triage
    description: error-level log summary for a currently-running devnet
    input: "Pick any currently-running devnet and summarize its error-level log volume
      from the last few hours — which services or hosts are noisiest?"
    tags: [clickhouse, networks]
    assert:
      - type: llm-rubric
        value: >
          Discovers a devnet that is actually running right now, queries its container
          logs (OTel logs in ClickHouse) filtered to error severity, and reports a
          per-service or per-host breakdown with real counts. Log-derived numbers
          for
          a named, current devnet pass; an answer with no real log query fails.
    variations:
      - Choose any currently-running devnet and summarize the volume of 
        error-level logs over the last few hours, highlighting the noisiest 
        services or hosts.
      - 'For any devnet that is currently running, report on error-level log volume
        from the last few hours: which services or hosts are generating the most noise?'
      - I'm trying to understand recent error-level log volume on a 
        currently-running devnet. Pick any one and summarize the last few hours,
        including which services or hosts are noisiest.
      - Please select any currently-running devnet and provide a summary of its 
        error-level log volume for the last few hours, identifying the services 
        or hosts with the highest noise.
      - Pick a live devnet and give me a quick read on error-level log volume 
        from the last few hours. Which services or hosts are the loudest?


  - id: cbt_table_bounds
    description: >-
      data range of mainnet fct_block, sourced from pipeline coverage without
      being told to check it
    input: "How far back does the fct_block table go on mainnet, and how current
      is it?"
    network: mainnet
    tags: [networks]
    assert:
      - type: llm-rubric
        value: >
          The question never mentions CBT: the agent should recognize that
          fct_block is a pipeline-built aggregated table and source the answer
          from the pipeline's coverage/bounds metadata (the cbt module),
          translating the unix-second range into human dates — coverage starts
          at mainnet genesis (2020-12-01) and extends to roughly the present.
          Coverage-derived ranges pass; full-table MIN/MAX scans (even with
          correct dates), invented dates, or no real query fail.
    variations:
      - "Before I write queries against mainnet's fct_block: what date range
        does it actually have data for?"
      - What's the earliest and latest data in the fct_block table on mainnet?
      - Does the fct_block table on mainnet cover all of history, or are
        there gaps?
      - I queried fct_block on mainnet for a recent date and got nothing back
        — is the table behind, or did I do something wrong?
      - How fresh is mainnet's fct_block table, and how far back does it
        reach?


  - id: forky_node_coverage                               # 💬 fork-choice capture ask
    description: live forky fork-choice snapshot coverage on sepolia
    input: "Which beacon nodes does Forky have fork-choice snapshots for on sepolia
      right now, and what consensus clients are they running?"
    network: sepolia
    tags: [smoke, networks]
    assert:
      - type: llm-rubric
        value: >
          Lists the sentry nodes Forky has frames for on sepolia from a real Forky
          query (node names like utility-sepolia-<client>-<el>-001) and names the
          consensus clients behind them (e.g. lighthouse, prysm, teku, nimbus).
          Concrete node names sourced from Forky pass; invented node names, an
          empty hand-wave, or no real query fail.
    variations:
      - What nodes are reporting fork-choice data to Forky on sepolia at the 
        moment, and which consensus clients do they run?
      - Using Forky, list the beacon nodes with fork-choice snapshots on sepolia
        right now and the consensus client each one runs.
      - "I'm trying to see Forky's current sepolia coverage: which beacon nodes
        have fork-choice frames, and what consensus clients are those nodes on?"
      - Which sentry nodes currently have fork-choice snapshots captured in 
        Forky for sepolia, and what consensus clients are they running?
      - Please query Forky for sepolia and report the beacon nodes it has
        fork-choice snapshots from, including their consensus clients.

  - id: tracoor_node_coverage                             # 💬 forensics capture ask
    description: live tracoor beacon-state capture coverage on mainnet
    input: "Which nodes is Tracoor capturing beacon states from on mainnet right
      now, and what consensus clients are they running?"
    network: mainnet
    tags: [smoke, networks]
    assert:
      - type: llm-rubric
        value: >
          Lists the sentry nodes Tracoor has beacon-state captures from on
          mainnet from a real Tracoor query (node names like
          utility-mainnet-<client>-<el>-001) and names the consensus clients
          behind them (e.g. lighthouse, prysm, teku, nimbus, lodestar,
          grandine). Concrete node names sourced from Tracoor pass; invented
          node names, an empty hand-wave, or no real query fail.
    variations:
      - What nodes are feeding beacon-state snapshots into Tracoor on mainnet
        at the moment, and which consensus clients do they run?
      - Using Tracoor, list the nodes with beacon state captures on mainnet
        right now and the consensus client each one runs.
      - "I'm trying to see Tracoor's current mainnet coverage: which nodes
        have beacon state captures, and what consensus clients are those
        nodes on?"
      - Which sentry nodes currently have beacon states archived in Tracoor
        for mainnet, and what consensus clients are they running?
      - Please query Tracoor for mainnet and report the nodes it has beacon
        state captures from, including their consensus clients.

