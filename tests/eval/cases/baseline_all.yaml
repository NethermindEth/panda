# The frozen all-questions baseline set: every case from smoke, coverage, multi_step,
# and visualizations, variations included. Measured with --rounds 0 against a release
# or master to produce the reference number future PRs are compared to — do not
# tune questions here; edit the source files and regenerate (see git log).
- id: mainnet_block_arrival_p50
  description: p50 block arrival of the most recent mainnet block
  input: What's the p50 block arrival of the most recent mainnet block?
  network: mainnet
  tags:
  - smoke
  - clickhouse
  - blocks
  - timing
  assert:
  - type: llm-rubric
    value: 'Reports a p50 (median) block arrival time for recent mainnet blocks, derived from a real ClickHouse
      query against block-timing data. An answer with no number, a hallucinated figure, or one wildly
      outside that range fails.

      '
  variations:
  - What is the p50 block arrival for the most recent mainnet block?
  - Give me the p50 block arrival of the latest mainnet block.
  - I'm trying to find the p50 block arrival for the most recent mainnet block.
  - For the most recent mainnet block, what is the p50 block arrival?
  - Please report the p50 block arrival metric for the most recent mainnet block.
- id: list_datasources
  description: Discover available datasources
  input: What datasources are available for me to query? List them.
  tags:
  - smoke
  - discovery
  assert:
  - type: llm-rubric
    value: 'Lists the datasources the harness actually exposes (discovered live, not guessed). A vague
      non-answer or an invented list fails.

      '
  variations:
  - Which datasources can I query? Please list them.
  - List the datasources that are available for me to query.
  - I'm trying to see what datasources I can query. Can you list them?
  - What are all of the available datasources I’m able to query?
  - Please provide a list of the datasources available for me to query.
- id: block_count_24h
  description: Block production count for the last 24 hours
  input: How many blocks were produced on mainnet in the last 24 hours?
  network: mainnet
  tags:
  - smoke
  - basic
  - blocks
  assert:
  - type: llm-rubric
    value: 'Reports a count of mainnet blocks produced in the last 24 hours, from a real query. A missing
      or hallucinated figure fails - the data must be sourced from  a datasource.

      '
  variations:
  - How many mainnet blocks were produced in the last 24 hours?
  - Count the number of blocks produced on mainnet over the last 24 hours.
  - In the past 24 hours, how many blocks has mainnet produced?
  - I'm trying to find the total number of blocks produced on mainnet in the last 24 hours.
  - What is the block production count on mainnet for the last 24 hours?
- id: missed_slots_24h
  description: Missed slots in the last 24 hours
  input: How many slots were missed in the last 24 hours on mainnet?
  network: mainnet
  tags:
  - smoke
  - basic
  - missed_slots
  assert:
  - type: llm-rubric
    value: 'Reports a count of missed (skipped) mainnet slots over the last 24 hours, from a real query.
      This is normally a small fraction of slots (order of tens), so a low count passes; a missing answer
      or an implausibly huge number fails.

      '
  variations:
  - 'Missed slots on mainnet in the last 24 hours: how many?'
  - What is the count of missed slots on mainnet over the last 24 hours?
  - I'm trying to find out how many slots have been missed on mainnet during the last 24 hours.
  - Please report the number of slots missed on mainnet in the last 24 hours.
  - For mainnet, how many slots were missed over the past 24 hours?
- id: devnets_running
  description: which devnets are currently active (network discovery)
  input: What devnets are currently running?
  tags:
  - discovery
  - cartographoor
  - devnets
  assert:
  - type: llm-rubric
    value: 'Names the devnets currently active, discovered live from the network-discovery data (not guessed
      or remembered). A concrete list of one or more current devnet names passes; a vague non-answer or
      an admission it couldn''t find out fails.

      '
  variations:
  - Which devnets are running right now?
  - List the devnets that are currently running.
  - What development networks are active at the moment?
  - I'm trying to see which devnets are presently running.
  - Can you tell me which devnets are currently up and running?
- id: devnet_beacon_peers
  description: beacon node peer count on a devnet (prometheus)
  input: What is the peer count of a beacon node on a devnet right now?
  tags:
  - prometheus
  - devnets
  - peers
  assert:
  - type: llm-rubric
    value: 'Reports a current peer count for a beacon node on a devnet, from a real Prometheus query —
      a plausible small-network integer (e.g. single digits to low hundreds). A specific number passes;
      no number or a fabricated one fails.

      '
  variations:
  - How many peers does a beacon node on a devnet have right now?
  - Report the current peer count for a beacon node on a devnet.
  - I’m trying to find the peer count of a beacon node on a devnet at this moment.
  - What is the current number of peers for a beacon node on a devnet?
  - Right now, what peer count does a beacon node on a devnet show?
- id: mev_timing_games
  description: which entities delay block proposals to extract MEV
  input: Which entities delay their block proposals the most to extract MEV on mainnet?
  tags:
  - clickhouse
  - blocks
  - mev
  - timing
  - entity
  assert:
  - type: llm-rubric
    value: 'Identifies specific mainnet entities (builders/validators/pools) that propose blocks later
      in the slot than the field, backed by a real query that ties block timing to entity. Names concrete
      entities with supporting timing evidence; a generic essay with no entities or no real data fails.

      '
  variations:
  - On mainnet, which entities delay block proposals the most in order to extract MEV?
  - Which mainnet entities are delaying their block proposals the most to capture MEV?
  - I'm trying to identify the entities on mainnet that most delay their block proposals for MEV extraction.
  - List the entities that delay their block proposals the most to extract MEV on mainnet.
  - Formally, which entities exhibit the greatest block proposal delays for MEV extraction on mainnet?
- id: block_size_vs_propagation
  description: effect of payload size on propagation time
  input: How much does block payload size affect block propagation time on mainnet?
  tags:
  - clickhouse
  - blocks
  - propagation
  - size
  assert:
  - type: llm-rubric
    value: 'Quantifies the relationship between block payload size and propagation/arrival time on mainnet
      from real queried data — e.g. larger blocks arriving later, with numbers or a correlation. A grounded
      characterization of the effect passes; a hand-wave with no data fails.

      '
  variations:
  - What effect does block payload size have on block propagation time on mainnet?
  - Can you quantify how block payload size impacts block propagation time on mainnet?
  - On mainnet, how strongly is block propagation time affected by block payload size?
  - I'm trying to understand how much block payload size influences block propagation time on mainnet.
  - Determine the extent to which block payload size affects block propagation time on mainnet.
- id: empty_blob_submitters
  description: who submits blob txs containing empty (zero-data) blobs
  input: Which entities submit blob transactions containing empty (zero-data) blobs on mainnet?
  tags:
  - clickhouse
  - blobs
  - execution
  - entity
  assert:
  - type: llm-rubric
    value: 'Names specific entities/senders that submit blob transactions carrying empty (zero-data) blobs
      on mainnet, from a real query over blob/transaction data. Concrete submitters with supporting counts
      pass; a generic answer or no data fails.

      '
  variations:
  - On mainnet, which entities are submitting blob transactions that include empty (zero-data) blobs?
  - Identify the entities that submit mainnet blob transactions containing empty (zero-data) blobs.
  - I'm trying to find which entities on mainnet submit blob transactions with empty (zero-data) blobs.
  - Which mainnet entities have submitted blob transactions that contain empty (zero-data) blobs?
  - Please list the entities that submit blob transactions with empty (zero-data) blobs on mainnet.
- id: precompile_usage
  description: most-used EVM precompiles on mainnet
  input: Which EVM precompiles are used most on mainnet?
  tags:
  - clickhouse
  - execution
  - evm
  - precompiles
  assert:
  - type: llm-rubric
    value: 'Ranks the most-used EVM precompiles on mainnet (e.g. ecRecover, SHA-256, identity, the BN/KZG
      precompiles) by real usage counts from a query. A ranked list grounded in data passes; a guess from
      general knowledge with no query fails.

      '
  variations:
  - Which EVM precompiles see the most use on mainnet?
  - On mainnet, which EVM precompiles are used the most?
  - I'm trying to identify the most-used EVM precompiles on mainnet.
  - List the EVM precompiles with the highest usage on mainnet.
  - Which EVM precompiled contracts have the greatest usage on mainnet?
- id: mev_relay_share
  description: share of recent blocks delivered via an MEV relay
  input: What share of mainnet blocks over the last 24h were delivered via an MEV relay?
  tags:
  - clickhouse
  - blocks
  - mev
  - relay
  assert:
  - type: llm-rubric
    value: 'Reports the share of recent mainnet blocks delivered via an MEV relay, from a real query (relay-delivered
      blocks over all blocks). The true figure is high — roughly 85-95% — so an answer in that band passes;
      a missing percentage or one far outside it fails.

      '
  variations:
  - What percentage of mainnet blocks in the last 24h were delivered through an MEV relay?
  - Over the last 24h, what share of mainnet blocks came via an MEV relay?
  - I'm trying to find the share of mainnet blocks delivered via an MEV relay over the last 24h.
  - Calculate the proportion of mainnet blocks over the last 24h that were delivered via an MEV relay.
  - For mainnet blocks in the last 24h, what fraction were delivered via an MEV relay?
- id: session_data_analysis
  description: Multi-turn data analysis with session persistence
  network: mainnet
  tags:
  - multi_step
  - session
  - analysis
  steps:
  - prompt: Query the last 1000 blocks on mainnet and save the data to a CSV file.
  - prompt: Now load that CSV and calculate the average gas used per block.
  - prompt: Create a histogram of gas usage from the data.
  assert:
  - type: llm-rubric
    value: 'Across the turns the agent queries ~1000 recent mainnet blocks, computes a plausible average
      gas used per block (tens of millions of gas, e.g. ~10M-40M), and produces a histogram of gas usage.
      Must provide the storage URL of the chart image it uploaded. A missing chart URL or an implausible
      gas figure fails. Must re-use the session to maintain persistence between turns (look for a session_id.)

      '
  variations:
  - Fetch data for the most recent 1000 blocks on mainnet and write it to a CSV file.
  - I'm trying to pull the last 1000 mainnet blocks and save the resulting data as a CSV.
  - Please query mainnet for the last 1000 blocks and export the data to CSV.
  - Can you retrieve data from the latest 1000 blocks on mainnet and store it in a CSV file?
  - Run a query over the last 1000 blocks on mainnet, then save the data into a CSV file.
- id: block_timing_analysis
  description: Detailed block timing analysis workflow
  network: mainnet
  tags:
  - multi_step
  - timing
  - analysis
  steps:
  - prompt: Query block arrival times for the last 100 slots on mainnet.
  - prompt: Group the data by observer consensus client and calculate the mean and p95 arrival time for
      each.
  - prompt: Create a box plot comparing the arrival time distributions across clients.
  assert:
  - type: llm-rubric
    value: 'Across the turns the agent pulls block arrival times for recent mainnet slots, breaks them
      down per observing consensus client with mean and p95 values (plausible sub-second to a few-second
      timings), and produces a box plot comparing the per-client distributions. Must provide the storage
      URL of the chart image it uploaded. A missing chart URL, no per-client breakdown, or implausible
      timings fails. Must re-use the session to maintain persistence between turns (look for a session_id.)

      '
  variations:
  - Get block arrival times for the last 100 slots on mainnet.
  - Can you query the block arrival times for the last 100 slots on mainnet?
  - I'm trying to retrieve block arrival times over the last 100 slots on mainnet.
  - Please query mainnet block arrival times for the last 100 slots.
  - Fetch the arrival times of blocks for the last 100 slots on mainnet.
- id: block_time_histogram
  description: Generate a histogram of block arrival times
  input: Create a histogram showing the distribution of block arrival times for the last 1000 blocks on
    mainnet.
  network: mainnet
  tags:
  - visualization
  - histogram
  - timing
  assert:
  - type: llm-rubric
    value: 'Produces a histogram visualization (a returned chart URL or saved image) of block arrival
      times for recent mainnet blocks, built from real queried data. A textual summary with no chart artifact,
      or one not grounded in a real query, fails. Must provide the storage URL of the image it uploaded.

      '
  variations:
  - Plot a histogram of block arrival times using the last 1000 blocks on mainnet.
  - Show the distribution of block arrival times for mainnet's last 1000 blocks as a histogram.
  - I'm trying to visualize how block arrival times are distributed across the last 1000 mainnet blocks
    in a histogram.
  - Generate a histogram that displays the distribution of block arrival times for the most recent 1000
    blocks on mainnet.
  - For the last 1000 blocks on mainnet, create a histogram of their block arrival times.
