cbt_model_discovery:
  name: Model Discovery
  description: Discover ClickHouse data models and external tables managed by CBT
  examples:
    - name: List all models
      description: List all CBT data models for a network
      query: |
        from ethpandaops import cbt

        # List networks with CBT
        networks = cbt.list_networks()
        print(f"Networks with CBT: {[n['name'] for n in networks]}")

        # List all models for a network
        network = networks[0]["name"]
        models = cbt.list_models(network)
        print(f"\nModels for {network}:")
        for m in models:
            print(f"  - {m.get('id', 'unknown')}: {m.get('type', 'unknown')}")

    - name: Find the model behind a table
      description: Search models by name to find the transformation that builds a table
      query: |
        from ethpandaops import cbt

        network = "mainnet"
        matches = cbt.list_models(network, search="fct_block")
        for m in matches:
            print(f"  - {m['id']} ({m['type']})")

    - name: Get external model details
      description: Get details of a raw source table by ID (database.table)
      query: |
        from ethpandaops import cbt

        network = "mainnet"
        model = cbt.get_external_model(network, "default.beacon_api_eth_v1_events_block")
        print(f"Model: {model.get('id')}")
        print(f"Interval type: {model.get('interval', {}).get('type')}")
        print(f"Lag: {model.get('lag')}")

cbt_table_bounds:
  name: Table Bounds and Coverage
  description: >-
    How far back a table goes, how fresh it is, and whether it has gaps —
    from pipeline coverage metadata, without scanning the table
  examples:
    - name: How far back does a table go and how current is it
      description: >-
        Answer "what time range does this table cover", "how far back does it
        go", or "how fresh is it" from the pipeline's processed (position,
        interval) ranges instead of running MIN/MAX scans. Positions for
        slot-type models are unix seconds; multiple ranges mean there are
        gaps.
      query: |
        from datetime import datetime, timezone

        from ethpandaops import cbt

        network = "mainnet"
        coverage = cbt.get_transformation_coverage(network, f"{network}.fct_block")
        for r in coverage.get("ranges", []):
            start = datetime.fromtimestamp(r["position"], tz=timezone.utc)
            end = datetime.fromtimestamp(r["position"] + r["interval"], tz=timezone.utc)
            print(f"  {start} -> {end}")

    - name: Check raw data bounds
      description: Get the min/max available positions for every external source table
      query: |
        from ethpandaops import cbt

        network = "mainnet"
        bounds = cbt.get_external_bounds(network)
        for b in bounds:
            print(f"  - {b['id']}: {b.get('min')}..{b.get('max')}")

    - name: Debug why data is missing at a position
      description: >-
        Explain whether a transformation can process a position — shows the
        model's coverage window, each dependency's bounds and gaps, and the
        blocking reasons
      query: |
        from ethpandaops import cbt

        network = "mainnet"
        position = 1749600000  # unix seconds for slot-type models
        debug = cbt.debug_coverage(network, f"{network}.fct_block", position)
        print(f"Can process: {debug.get('can_process')}")
        print(f"Validation: {debug.get('validation')}")
        for dep in debug.get("dependencies", []):
            print(f"  dep {dep.get('id')}: {dep.get('coverage_status')} bounds={dep.get('bounds')}")

cbt_transformation_status:
  name: Transformation Status
  description: Check the status and definitions of data transformations
  examples:
    - name: List transformations
      description: List all data transformations and their types
      query: |
        from ethpandaops import cbt

        network = "mainnet"
        transformations = cbt.list_transformations(network)
        print(f"Transformations for {network}:")
        for t in transformations:
            print(f"  - {t.get('id', 'unknown')}: type={t.get('type', 'unknown')}")

    - name: Inspect a transformation
      description: Get a transformation's SQL content, schedules, and dependencies
      query: |
        from ethpandaops import cbt

        network = "mainnet"
        t = cbt.get_transformation(network, f"{network}.fct_block")
        print(f"Type: {t.get('type')}")
        print(f"Depends on: {t.get('depends_on')}")
        print(f"Schedules: {t.get('schedules')}")

cbt_scheduled_runs:
  name: Scheduled Runs
  description: Monitor scheduled transformation runs
  examples:
    - name: Check scheduled runs
      description: View last-run times for scheduled transformations
      query: |
        from ethpandaops import cbt

        network = "mainnet"
        runs = cbt.get_scheduled_runs(network)
        print(f"Scheduled runs for {network}:")
        for r in runs:
            print(f"  - {r.get('id', 'unknown')}: last_run={r.get('last_run')}")

    - name: Get interval types
      description: >-
        Get the interval type definitions that map positions to human units
        (e.g. slot positions are unix seconds)
      query: |
        from ethpandaops import cbt

        network = "mainnet"
        intervals = cbt.get_interval_types(network)
        print(f"Interval types for {network}:")
        print(intervals)

cbt_deep_links:
  name: Deep Links
  description: Generate CBT UI links for models
  examples:
    - name: Generate model links
      description: Create deep links to the CBT web UI for models
      query: |
        from ethpandaops import cbt

        network = "mainnet"
        link = cbt.link_model(network, f"{network}.fct_block")
        print(f"View in CBT: {link}")
