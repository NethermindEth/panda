loki_basics:
  name: Loki Log Queries
  description: Common LogQL query patterns for Ethereum node log analysis. Always use | line_format to trim payloads and reduce response size.
  examples:
    - name: Recent beacon node errors
      description: Get recent error logs from beacon nodes with trimmed output
      cluster: loki
      query: |
        {app="beacon-node"} |= "error" | json | line_format "{{.message}}"
    - name: Consensus warnings
      description: Get warning-level logs related to consensus with trimmed output
      cluster: loki
      query: |
        {app="beacon-node"} |= "warn" |= "consensus" | json | line_format "{{.message}}"
